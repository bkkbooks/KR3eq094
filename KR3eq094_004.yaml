中心帶黃此是體虛濕蘊先為分利膀胱續投培補奇經肝腎茅朮炒白朮炒赤苓豬苓澤瀉羌活防風黃耆當歸杜仲川斷苡米炒狗脊山藥木瓜白果鹿角霜內外兼症許因傷而腫因腫而膿瀉膿耳後腫處痛仍不減傷未和也午後微寒發熱日暮稍退至黃昏仍復如前天明熱漸退去由來一月有餘此所謂不內外因而兼外因之恙不內外因者傷也外因者夏暑秋風感而似瘧日夜兩至氣血俱受邪也柴胡洋參當歸鮮青蒿紅花丹皮延胡生炒木香甘草生炒黑梔赤白芍川玉金中生地桃仁泥某身懷六甲滯下已難況可肋下患乎重險之症茅朮黃芩蘇梗枳殼赤苓木香廣玉金虞右膝痛減即在膝加重兼頭痛發熱脈至數而左關浮弦蓋諸節屬肝風性喜於乘木遊行無定症兼內外無非風之徹上徹下也柴胡防風秦艽羚羊角連翹木香木瓜丹皮赤芍赤苓歸尾銀花川膝獨活章花後餘邪未盡毒火刑金金傷則水涸水涸則陰虧陰虧則入暮發熱手太陰少商穴出於大指之端今之指尖腐爛出血亦見肺熱葉焦有諸內而形諸外也胸腹漸漸飽滿清肅之令不行則濁氣在上而生膹脹也且金傷木無所制而脾土受侮土衰則不健運濕積停矣能無面色痿黃而形瘦腹脹擬培土生金法洋參茯苓天冬首烏山藥神麯冬朮炒苡米陳皮銀花白芍升麻穀芽生炒桑枝瘰癧施稟質陰虧陰虧者必火熾而上越肺金受灼則為咳吐紅今雖血不見而虛陽不潛絡脈為枯右耳後結核纍纍入貫珠者此謂虛痰良由日受龍雷燔爍筋無血養所致非比痰實可攻可消而能速效急宜凝神靜養絶欲往年乃是治此症之良圖兼以壯水育陰制陽軟堅毋求欲速方可湊功如不遵戒守雖服藥無益慎之慎之大熟地生決明元參草節北沙參川貝牡蠣懷藥又方大合桃二十個蟬蛻五個將合桃對縫劈開以蟬七個和桃肉研碎乃裝入殼內鹽泥包裹火內煨焦去泥研末用淡鹽湯調送每日一服作二十服另包倘若煨過成白灰者不用未盡煨焦者亦不用李水不上承火不下降肺液被劫咽喉不寬頸側兩旁痰癧成串硬而無情此虛痰也不易應效商清金壯水鹽以軟堅法北沙參元參生地海浮石川貝桔梗銀花乾草節牡蠣疔吳腮疔走黃勢在十分凶險勉方以冀百中之一銀花二兩甘菊一兩柴地丁五錢蒲公英五錢知母一錢五分大貝三錢花粉三錢甲片二錢角針三錢乳香一錢炒河車一錢此方三劑大效骨疽某附骨疽大症也消亦不易成攻亦難速痊總要耐心柴胡黃芩桂枝蒼朮獨活防風當歸甲片角針連翹牛膝全蠍赤勺木香某大勢已退但腐未脫新未生尚在險途能遵戒守醫藥得力非不可愈然人事不能善養亦易生變慎之慎之羌活川芎生草銀花洋參焦冬朮廣皮砂仁扁豆上耆當歸生赤首烏焦穀芽某病有輕者重者輕者數劑可愈非關醫之能也重者數十劑而愈有半載經年而愈有數年而愈非關醫之不能也總貴識症如初此症附於筋骨其發也甚緩收攻也甚難調養得宜原有可愈調理不善每多中變須耐心服藥寒暖飲食事事小心水到渠成一定之理如欲速非惟無益適足以有害也上耆當歸白芍川芎熟地洋參茯苓杜仲冬朮炙草丹參杞子懷藥廣皮薑棗某膿雖有尚未退透所嫌身懷六甲攻消之藥礙胎者多求其平穩者施之於重大者難以見功刻下胎氣時時上逆可不以安胎為急務乎在外症勢在作膿之時當兼內托蘇梗黃芩砂仁當歸洋參羚羊片甘草花粉銀花甘菊元參白朮光緒元年春月録附薛應嵩醫論胎産保命方全當歸一錢五分川芎一錢五分生黃耆八分白芍酒炒一錢二分冬用一錢荊芥穗八分川貝母去心研一錢蘄艾醋炒七分川羌活五分枳殼麩炒六分菟絲子揀淨酒泡一錢四分紫熟厚朴薑汁炒七分甘草五分生薑三片此方專治一切産症未産時不拘月數或偶傷胎氣腰疼腹痛其有血下之勢服者能安或小産危急之際一服即愈再服全安或十月正産交骨不開橫生逆下數日難産或子死腹中命在危急服之立愈此方系異人傳授救人危急每用不過兩劑屢試無不神效幸勿輕視藥須地道照方炮製稱準惟産後禁服難産當歸三錢川芎一錢五分煎沖黃酒每送二丸警醒産後落胎打胎保命格言世説産後傷筋動骨一百念日勿可通房信斯言也犯者諸藥無效輕則長病兩月犯成癆重則短命一月犯不幸嗟乎惜哉産後未犯雖症危險猶可回生家傳丸丹立見奇功即經年外可保無虞愚謂醫治産後落胎打胎服補寒澀必死無疑戒之慎之此症無論寒暑虛實冷熱腹痛瀉痢嘔惡一切不必診脈方無增減順存達亡屢試屢驗保其家室以終餘年信無謬矣姑以煎方附後訣曰焦延炮當桃赤丹澤紅川青桂香桃肉兩個五劑安古書不軌逸之惜乎好事者附載薄書攸久無疆遍傳四方超生無量焦山楂四錢延胡索打碎一錢炮薑炭一錢當歸身一錢五分赤芍一錢五分桃仁泥二錢紫丹參二錢澤蘭二錢紅花一錢川芎一錢五分細青皮一錢安桂心七分香附三錢濮桃肉二個五劑安忌補寒澀要略生炙熟地黃耆炙甘草炒當歸人參黨參洋參天麥冬阿膠棗仁犀角羚羊角生軍黃連鮮生地鮮石斛金銀花花粉連翹夏枯草炒丹皮黃芩薄荷知母葛根寒水石石膏竹葉蘆根五味子煅牡蠣烏梅萸肉白芍信受奉行生者衆矣同治七年戊辰四月既望時年八十錫山薛應嵩識

body:
  text: 卷四嘔吐某胃為陽土喜潤而惡燥宜降不宜升今診脈右關滑大唇紅口甜納穀輒吐無餘雖湯飲不納業已月餘大便兩旬不解脈症合參系陽明實火閉結胃氣有失下行之旨法宜清降川貝五錢活水蘆根去節五錢竹茹一錢淡薑渣二分另用上龍井茶葉一撮生薑一片泡湯飲白扁豆煮爛如糊食之以代粥嘔止便解用獨參湯以扶正氣吏左朝日暮吐脈來細軟當培火生土焦六曲一錢五分焦穀芽三錢淡乾薑炒三分茯苓一錢冬朮炒三錢炙草三分益智仁炒一錢遠志炒八分蔻仁陳左胃氣逆行以致作嘔半夏炒三錢黨參一兩生熟砂仁一錢蔻仁三丁香七粒烏梅一枚薑二陳右厥陽犯胃氣逆則嘔胃氣下行為順肝陽以清泄為宣但由來已久不可不兼扶正半夏炒一錢五分陳皮一錢五分砂仁一錢枳殼炒四分洋參二錢川連二分吳茱萸一分竹茹八分蘆根五錢車前子三錢薑一片大麥仁四錢某納食輒嘔著寒則甚胸脘作痛冬朮三錢黨參三錢炙草六分蔻仁二粒陳皮一錢淡乾薑二分竹茹八分木香汁三匕灶心土煎湯代水王左嘔吐本胃病而胃為腎之關有因水之不足而不能制胃火者有因火之不足而不能生胃土者此兩説之辨論最詳大凡食入即出者屬火之有餘必得腎水以濟之無過於六味作湯資飲昨服既能安適不必日日更換且服十濟再商熟地一兩二錢萸肉三錢丹皮炒一錢五分茯苓三錢懷藥三錢澤瀉一錢五分懷膝邵左久咳邪移於胃則嘔此胃失下行之司而上逆也擬六君合蘇子降氣法肺胃同調黨參半夏陳皮茯苓冬朮炙草蘇子砂仁生薑某胃氣應降不降濁氣不泄而作嘔半夏炒三錢陳皮二錢砂仁一錢柏子仁一錢萊蔔子五分蘇子一錢薑一大麥仁炒一錢陳右診脈左寸關獨數納食輒嘔大便不通肝陽犯胃腑氣有升無降川連二分枳實五分吳茱萸三分檳榔一錢五分蔞仁三錢薑三川楝子炒三錢青皮炒一錢木香沖四分洋參二錢黑梔一錢元胡索生炒三錢生熟砂仁一錢吳脈形兩損咳痰嘔逆身熱汗濡頭暈氣升症勢甚劇擬調中培土冀其嘔止納穀冬朮懷藥白芍陳皮茯苓穀芽過左面色淡白口吐清涎脈至關脈沉細寒濕停於胃脘理中湯主之黨參四錢冬朮炒三錢炙草炭三分泡薑八分陳皮一錢蔻仁三粒孫左胃氣大傷納食則吐藥味偏劣者均非所宜竹茹薑汁炒一錢烏梅一個伏龍肝一兩煎湯飲又龍井茶葉一撮薑一又好醋十匕生薑一錢建蓮煮爛作點心山藥煮爛代飲大鯽魚煮熱薑醋煮蘸食陳積飲停痰作脹作嘔半夏陳皮生熟砂仁神麯炒焦麥芽茯苓木香生薑華左津液不足氣血虛弱納穀作嘔脘中作痛宜與辛潤腑氣以通為補製半夏二錢韭白二錢蔞仁二錢會皮三錢薑二大麥仁炒三錢黑芝麻四錢又原方加生熟砂仁三分川鬱金七分馬左食入至飢時作嘔完穀不化脾陽式微運化失職乾薑炒一分黨參三錢熟附四分生薑一半夏一錢許左嘔吐完穀脘痛攻撑六脈沉細不特胃虛脾陽亦衰黨參砂仁拌炒一兩半夏薑汁炒二錢乾薑五分白蜜十匕灶心土煎湯代水葉左脾不克運胃氣逆行納穀輒嘔脘痛作酸右關略見滑數不無痰火而兼挾滯擬和中法製半夏一錢五分廣皮一錢茯苓一錢五分生熟砂仁一錢川朴五分楂炭二錢大麥仁四兩薑渣五分竹茹五分趙左知飢能納食後一二時胸腹漸漸作痛得水穀盡行吐出方適顯系脾氣失健失運異功散加川朴枳殼炒穀芽炒神麯炒檳榔官桂炮薑木香管右納穀輒嘔胸次有塊積滯踞於中宮以至胃不容納製半夏二錢廣皮一錢五分檳榔一錢五分枳殼五分焦曲一錢五分川朴薑汁炒五分木香五分生熟砂仁五分薑二香附一錢五分蔣左中脘結塊如拳攻痛嘔吐焦白朮三錢焦枳殼八分生熟砂仁八分焦神麯一錢五分木香四分焦穀芽二錢史右肝胃之氣上逆為吐酸為嘴惡黨參炒二錢枳實五分青皮五分吳茱萸川連汁炒三分炙草三分覆花二錢製半夏二錢蔻仁二粒代赭石三錢麥芽三錢接方製半夏一兩茯苓一兩廣皮炒二兩香附炒一兩蔻仁一兩蓽澄茄五錢共研末每用一錢將木香湯送下嚴左能食不運胸脹痛嘔吐焦冬朮一兩焦曲一兩焦穀芽一兩焦麥芽三錢焦楂一錢製半夏一錢乾薑五分廣皮二錢熟砂仁五分霍亂胡左瀉泄嘔吐脈至數大左手尤甚舌乾而黃時令暑熱干於臟腑所謂熱泄熱嘔是也瀉多傷陰嘔多傷液恐有化燥舌短津枯轉筋之劇則險矣川連三分竹茹一錢廣皮八分薑渣三分蘆根一兩又脈數大較前減四五吐瀉亦漸少有轉機之兆又吐瀉雖止今日脈象較昨數大稍增右關更甚舌苔根黃陽明之熱不清議兼人參白虎湯洋參二錢麥冬二錢生石膏五錢滑石五錢淡薑渣三分川連五分通草五分竹葉十張蘆根一兩香粳米五粒廣皮一錢又脈症俱退七八余焰尤未盡減輕重製方可再投洋參二錢麥冬三錢生石膏一錢滑石二錢通草五分川連三分扁豆三錢廣皮一錢淡薑渣三分竹茹一錢蘆根一兩香粳米五粒胡右瀉泄嘔吐數日未已脈情左數右澀身體左熱右寒此陰陽不和升降失職亦是暑熱起見漸有轉筋之意須防加重況身懷六甲吐瀉動胎為害非輕宜涼不宜溫宜和不宜散川連三分竹茹一錢淡薑渣三分蘇梗一錢木瓜一錢廣皮八分又昨投泄熱和胃今諸恙稍滅然總要胎元不動則吉川連三分生薑三分竹茹一錢老蘇梗二錢廣皮八分木瓜一錢生熟砂仁六分以冷水滾水各半煎藥作酸某左左關弦滑食後作酸得吐則適似屬肝陽犯胃黨參四錢川連三分吳萸三分半夏二錢代赭石四錢旋覆花二錢陳皮一錢五分砂仁一錢木香四分生薑二錢左曲直作酸脈至左弦右弱宜兼泄肝陽此方在後談左作酸一症有因火旺者有胃陽衰者今色脈無力無神當以胃陽衰治之蔻仁二粒砂仁三粒陳皮一錢芡實炒三錢懷藥炒三錢杜仲三錢薑二邵濕停中脘脾不運也吐酸痞滿悶主以溫開半夏一錢五分陳皮一錢枳殼炒八分小朴五分生熟砂仁八分赤苓二錢薑一錢左曲直作酸脈至左弦右弱宜清泄肝陽半夏一錢五分茯苓三錢陳皮一錢枳殼炒七分吳茱萸二分川連一分蔻仁二粒黨參三錢伏龍肝三錢薑一噯氣吳胃氣逆行則噯脾氣不運則便溏黨參三錢茅朮炒一錢陳皮一錢半夏一錢萊蔔子五分神麯炒一錢炙草一分覆花三錢茯苓三錢大麥仁三錢木香三分炮薑四分孫左脈左弦胸痞作酸而噯肝氣上升而胃氣不降黨參三錢枳實六分赭石三錢覆花三錢當歸一錢五分半夏一錢茯苓三錢炙草二分大麥仁三錢降香五分又氣逆稍平宜當異功以培中土某氣逆作噯便溏脾陽不運胃氣不降炮薑皮六分益智仁五分焦曲一錢半夏一錢砂仁炒六分冬朮三錢廣皮一錢穀芽三錢大麥仁炒三錢木乘土袁右胸脅氣撑作痛上為嘔惡下為便溏脈見左弦右弱此肝木犯胃則嘔克脾則泄也焦茅朮五分白芍炒一錢半夏炒一錢陳皮七分蔻仁三粒延胡七分神麯七分炙草三分薑一片又焦茅朮一錢白朮炒一錢當歸四錢防風一錢白芍炒一錢肉桂五分良薑五分神麯一錢王左六脈細弱氣血兩虧面青形瘦肝木之旺脾土之衰顯見矣少腹之右攻撑作痛甚則嘔無非木乘土位肝病治肝不應急宜培土以平木發時不妨偏甚今之咳嗽又因寒邪客肺即謂病中加病亦宜兼治遠志叭杏杞子葫蘆巴南沙參官桂巴戟黨參冬朮某木侮胃土不飢少納胃為陽明喜於清降肝為剛臟宜疏和解柴胡三分丹皮三錢川鬱金二錢洋參三錢枳實一錢半夏一錢五分茯苓三錢石決明一具大麥仁三錢白蜜十匕榮左木鬱侮土土衰則不勝濕胸滿舌白嘔惡納減寤不成寐諸症迭出也洋參三錢當歸二錢茯神二錢炙草二分陳皮一錢棗仁三錢遠志四分冬朮炒二錢木香四分半夏一錢秫米炒三錢砂仁四分杜仲四錢黑梔五分菖蒲二分柴胡六分薑棗俞左脈至左弦右弱大便時溏時艱乃中陽衰弱肝木來侮之恙補火生土之中少兼抑木之品益智仁六分遠志炒六分冬朮炒二錢薑炭五分白芍一錢黨參炒三錢穀芽炒三錢焦神麯五分焦鍋巴煎湯代水趙脈來左弦右弱胸腹不寬此係土衰木侮和肝理脾為治冬茅朮一錢五分半夏一錢草果四分車前子一錢當歸一錢五分穀芽一兩香附一錢腹皮一錢五分懷藥三錢陳皮炒一錢五分神麯木瓜一錢茯苓一錢何木鬱侮土面黃乏力胸悶不舒當以調和肝胃冬朮炒三錢當歸三錢遠志炒五分陳皮一錢茯苓一錢五分杜仲三錢砂仁八分丹皮一錢穀芽炒三錢張右中脘時脹時寬良由木鬱侮土脾氣失運使然茅朮炒四分神麯炒八分陳皮炒一錢砂仁炒一錢香附一錢茯苓三錢黑梔五分鬱金七分麥仁炒三錢荷梗一尺某左關弦數右三部無力納穀減少時而攻撑似屬肝強脾弱擬逍遙散以舒肝培土柴胡三分當歸三錢白芍炒一錢茯苓二錢炙草二分焦茅朮一錢丹皮一錢黑梔八分陳皮一錢生熟芽各四錢芝麻三錢高左木鬱侮土陽旺陰虛為厥逆脘悶不舒內熱不已擬與加味逍遙散以和脾胃氣血宣暢諸恙自瘳柴胡三分當歸一錢五分白芍炒一錢雲苓一錢五分白朮一錢五分神麯八分丹皮一錢黑梔炒五分香附醋炒一錢大生地四錢薄荷炙草四分薑某右脈至遲滯左手尤甚時常吐酸過午發熱經水先期脈症合參乃是木鬱氣滯肝血有傷但清滋不利於吐酸填補不利於氣鬱按肝心喜疏惟鐵甕城申先生交加散有調和氣血之功能氣血調和不治熱而熱自除矣鮮玫瑰二兩白殘花二兩香附炒四兩丹皮四兩雲苓焙四兩曬乾研末水泛為丸香附雲苓煎湯送下二三錢沈右左關脈沉遲右關脈弦洪此木鬱侮土之恙用逍遙散以舒肝木兼培脾土柴胡四分當歸一錢五分白芍炒一錢茯苓三錢茅朮炒八分甘草二分山梔炒一錢丹皮炒一錢某左左脅下連中脘作痛時而嘔吐完穀不化據述三四年前曾經吐血色晦脈遲此肝木乘胃而陽衰者然也跤桂三分炮薑六分生熟延胡三錢廣皮一錢吳萸三分川朴六分木香三分噎膈俞左陽微陰勝液涸津枯納食不運時時吐酸完穀而出大便堅燥如栗不特胃氣有失下行為順元陽元陰兩虧極矣黨參八錢製半夏二錢白蜜十匕熟地一兩泡薑五分肉桂四分當歸二錢製附子四分王右左脈細弱右脈按之沉分有力而帶弦數嘔吐酸水大便乾燥脈症合參血分固虧氣亦不足然中焦不無痰火氣鬱滋膩之品未便擅投桂附雖能補火生土於肝腎血不足又恐劫陰且用人參吳萸湯兼淡理氣以探之黨參炒八錢製半夏炒二錢白蜜十匕陳皮一錢五分砂仁炒一錢沉香汁三匕吳萸四分魯左脈滑見於右關平素喜飲近見納食梗痛膈之漸也黨參五錢製半夏二錢蘇子炒二錢萊蔔子炒一錢枳實五分陳皮一錢薑汁三匕竹茹八分又梗痛已愈八九脈亦漸見和平前方還可再投原方加雞巨子一錢枇杷葉二錢葉左左脈弦滑見於關部右關無力而軟脘痛納食格拒木乘土衰恐成痰膈黨參八錢半夏炒二錢枳實炒六分代赭石四錢炙草三分陳皮一錢五分覆花四錢茯苓二錢史左氣不弱血不枯不至於噎膈今脈至沉遲細弱納食作嘔便不通調無非氣血枯稿脾不運化為痰擬用四物四君合二陳兼治黨參四錢冬朮三錢茯苓二錢炙草五分川芎八分熟地八錢白芍炒一錢當歸三錢陳皮一錢五分半夏一錢五分枳實五分乾薑四分沉香沖三匕白蜜五匕周左脈來左弦右滑且見歇止舌苔白而帶黃納食輒嘔平素喜飲濕熱蘊於中焦釀成痰膈氣逆而滯經曰上格嘔逆食不得入是有火也此其似乎川連五分
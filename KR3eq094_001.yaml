藥炒一錢五分生地一兩丹皮炒一錢五分天冬一錢川貝二錢鬱金七分藕節二穭豆衣三錢荊芥炒一錢五分惠左病後不邂風寒不慎勞碌咳傷血絡宜乎發熱失血等症迭出速速安養勿事操勞為囑北沙參元參生地丹皮天冬荊芥茜草竹茹穭衣藕節過左嗜飲不貪冷暖濕熱蘊於胃而蒸灼肺焉得不咳而見血苡米二兩百合一兩雞巨子一兩葛花一錢白及二錢藕節二緑豆一撮過左火酒之性熱而毒加溫燥之藥浸之以火濟火火上添油積熱於胃熏蒸灼肺咳嗽吐血所由來也脈至右寸關獨見有力而大理當清熱保肺但見飲食驟減大便溏薄又因飲食不節此病中加病且先為見病治病楂肉炒二錢神麯炒一錢焦穀芽一錢五分陳皮一錢五分麥芽炒一錢五分接方竹茹炒五分藕節二緑豆三錢葛花一錢天冬一錢香稻根鬚三錢鮮百合根鬚一錢又不能多言者氣弱大便燥結者血枯多食胸脘不寬者胃雖強而脾氣不足脈似有力自述身靜心定之時則細小種種見象純乎虛症見端急宜培補其本無徒從事其標洋參三錢生地一兩紅棗五芝麻二錢畢左久咳曾經見血近加喉痛音雌半由肝腎陰虛火旺半由時令風熱之邪生地一兩丹皮一錢五分茯苓二錢山藥三錢萸肉二錢澤瀉一錢五分元參二錢川貝一錢五分薄荷六分甘草一錢射干一錢北參四錢蟬衣一錢燈心一丈百合五錢黃久咳久熱近加咽碎音雌脈至兩關尺細數此屬陰虧陽旺稍挾客邪擬與清上實下之法六味丸加桔梗甘草元參北參芡實射干薄荷燈心某左咳嗽痰多帶血聲音不揚據述受寒起見理當溫散叭杏仁二錢蘇子二錢百部三錢款冬花三錢陳皮一錢荊芥炒八分細辛一分炮姜二分此二味三帖後不用楊左秉質陰虧兼以課讀耗氣勞神兩頭份結塊有時見紅脈至左三部細數寸尤甚右三部細軟顯系氣分有虧肝腎陰虛厥陽上熾生地一兩山藥三錢白芍一錢五分丹皮一錢茯苓一錢五分元參二錢草節一錢川貝一錢黃耆三錢牡蠣煅五錢青蓮心十張左失血咳嗽便溏納減脈至細數寸關浮大出於右部顯系水虧於下陽浮於上致爍肺經恙非輕瘀陰虧之熱非六淫之火可比豈芩蓮知柏可退無怪乎脾土日虧至成棘手經曰寒之不寒責其無水又曰勞者溫之宗此二義朝用都氣以壯水制陽晚用百合固金以培土補肺熟地炙八錢懷藥炒一兩二錢萸肉去核炒一錢五分丹皮一錢五分茯苓一錢五分澤瀉鹽水炒一錢五味三分某左屢屢吐血乾咳不已脈見弦數肺腎兩虧擬二地二冬湯以清金保肺壯水制陽前云課讀傷氣氣屬肺肺為腎母腎為肺子未有母傷而子不傷者也生地五錢熟地一兩天麥冬各一錢五分北參一錢五分玉竹六錢川貝二錢白薇一錢山藥三錢扁豆二錢百合三錢炙草四分元稻根鬚二錢許右血雖止而嗽不除六脈無力氣血兩傷前方之中參入補土生金熟地炙一兩當歸二錢黨參四錢冬朮二錢廣皮一錢百合二錢冬花蜜炙三錢元稻根鬚二錢某咳吐臭痰胸膈不寬二便不爽此胃氣逆行衝犯肺經應降不降也胃氣不降則二便不爽胃氣不運則胸膈不寬矣蘇子炒一錢五分北沙參四錢天冬一錢玉竹五錢川貝二錢桔梗一錢桑皮一錢茯苓二錢苡米八錢生熟砂仁六分廣皮一錢五分枳殼五分竹茹五分降香五分王右咳吐穢濁痰涎脈至右關無力左關弦大形瘦便溏乃木旺無制土衰受克法當抑木以培土培土則生金金則可以制木矣北參三錢炙草四分苡米六錢綿耆三錢白芍炒一錢五分扁豆四錢山藥四錢玉竹三錢冬朮一錢五分降香五分檀香五分元米湯代水邊左咳血如湧泉脈至細弱面無華色法當益氣以防血脫綿耆一兩當歸醋炒二錢蘆根一兩竹茹一錢參七一錢大麥冬二錢藕節三又脈雖虛弱較前有神血雖未止大勢已退茲當氣血並培綿耆元米炒一兩熟地一兩當歸醋炒二錢扁豆炒二錢荊芥炒一錢藕節一陳棕炭一錢又凡病調理兩得其宜重亦可醫如不遵戒守服藥難救況血症更當調養為先奔走於風熱之中外受客邪內傷筋骨若仍前沖嘔雖妙丹亦莫能止何況柳皮草根乎北沙參三錢熟地一兩當歸炭一錢五分綿耆鹽水炒六錢扁豆炒四錢川玉金七分炙草炭五分荊芥炭一錢五分茅針花一錢陳棕炭一錢又真陰未復虛陽未能潛藏宜乎壯水為主以制陽光生地一兩懷藥炒四錢萸肉六分丹皮炒一錢五分茯神二錢澤瀉一錢五分麥冬炒一錢扁豆炒一錢茅針花一錢陳棕炭一錢又右關脈見軟弱便溏後見紅而腹痛改投理脾益氣此血家善養之事大黃耆元米炒六錢冬朮炒三錢炙草六分雲苓一錢五分熟地八錢當歸鹽水炒二錢荊芥炭一錢白芍藥一錢姚左自四月失血之後至今三月咳仍不減今脈至右關滑大舌苔淡黃帶白而膩據述未見血前兩脅先行脹滿脈症合參乃胃有濕火肝陽上亢嬌臟受灼理當先為清理濕熱兼清肝火苡米炒五錢赤苓三錢滑石二錢丹皮炒一錢白芍炒一錢玉金七分扁豆炒三錢兜鈴一錢五分竹茹八分雞巨子炒三錢藕節一枚又舌苔垢膩漸退右關脈亦稍平胃家濕火已衰其半咳嗽夜半轉甚左關尤帶數象厥陰之陽依然亢逆法當清金以生水壯水以涵木北參三錢麥冬一錢五分生地四錢丹皮赤苓二錢扁豆炒三錢兜鈴炙一錢白芍一錢苡米三錢生熟甘草三分枇杷葉蜜炙二錢顧左夏秋之交受暑風而致咳逆帶痰帶血神情倦怠形瘦納減脈細數無力宜氣血並補兼調肺胃之中少佐清泄之品北參三錢麥冬二錢扁豆炒三錢黃耆元米炒三錢當歸炒二錢生地炙一兩川貝母一錢荊芥炭一錢牛膝炭一錢參三七一錢咳血者由於肺氣不寧失於潛降之司或胃氣逆行上犯金肺或肝陰不足厥陽上越或脾不統血遊溢於上或腎真不固而不司收攝納氣或君火內熾而臟陰不安其位或房事不節而相火煽其中或風溫內侵而逼血妄行或寒鬱於肺而久咳傷絡或飲酒過度酒熱傷營或暴怒鬥毆而氣鬱血凝然由內傷損者多而外感者少究其所以然皆由營虛不足氣衰不固也蓋血隨氣行氣為血帥凡血溢者必先補氣氣固而血自止矣擬用四君以治脾氣四陰以清金保肺甘桔以楚上焦風熱八珍以培三陰生脈以養金制木六味以壯水濡木歸脾以補肺八仙長壽以培肝腎金水六君以植肺腎之虛當歸補血以固其氣種種治法當玩熟而深思之吐血金左失血成碗盈盆脈來大而且數更兼腰痛又發熱無非肝腎陰不自立而虛陽不能潛伏矣生地二兩荊芥炭一錢五分丹皮一錢五分牛膝三錢杜仲三錢象貝三錢知母炒一錢五分竹茹一錢參七二錢竹葉十許左失血左肋作痛顯系肝絡有傷右眼氣輪赤色肺家現有客邪先為清解接服育陰清金平木法桑白皮一錢地骨皮一錢沙參三錢天冬一錢又生地五錢萸肉一錢茯苓一錢五分丹皮一錢懷藥三錢當歸一錢五分白芍一錢天冬一錢川貝一錢紅花三分又脈見和平血亦大減從此可以調理正氣自然漸愈矣生地八錢懷藥炒一兩扁豆一兩五錢冬朮二錢洋參三錢炙草四分荊炭一錢五分穀芽生炒四錢荷蒂炒一枚徐左據述病情先傷於脾繼及肝腎蓋肝不能藏血脾能統血腎能藏精不統所以泛於上或趨於下也肝腎為子母之臟子傷則盜氣於母精之所以不固也今血已止面色淡黃脈來細弱大便時溏脈症合參肝腎虧而脾陽尤弱矣芡實一錢黃耆六錢黨參三錢冬朮二錢當歸一錢五分茯神一錢五分遠志七分棗仁二錢炙草六分熟地八錢牡蠣煅三錢懷藥炒五錢五味七萸肉二錢杜仲三錢建蓮三錢龔左藥者原為補偏救弊而設經曰毒藥治病中病即止常藥治病衰其大半而止猛品之藥過投謂誅伐無過之地矣茲脈至洪浮而見革非胃家積熱積毒而何肺為嬌臟而屬金最畏者火日受火爍肺液焉有不傷失血口咳之所由來也麥冬二錢川貝四錢北參八錢天冬一錢五分藕節三竹葉十竹茹一錢某見紅而脈洪數陰氣大傷虛陽上亢難免血不復來重症急早靜室安養否則服藥無功沙參四錢生地五錢川貝二錢丹皮一錢五分青蒿梗一錢茜草八分龜板六錢秦艽一錢黑梔三錢鮮地骨皮二錢元稻根鬚一錢懷藥一錢某左土受木侮肋脹痛而食減金受火灼血出於口或見於鼻北參三錢麥冬一錢扁豆五錢川金七分蒺藜二錢白芍炒一錢元米湯代水蔣左血後先賢有云宜用六味久服以制陽光然又云當以胃藥收功平昔喜飲中焦濕濁阻遏因此痰多從前見紅又因陰虛火熾而來此二說不可偏廢宗此大旨洋參一錢五分茯苓二錢冬朮炒二錢懷藥三錢陳皮一錢苡米三錢沙參二錢川貝二錢款花三錢百合三錢姚左酒客胃口之上未有不有瘀者留於中焦有成膨脹者出於上焦有血盡而愈者有血盡而亡者生地一兩懷藥炒六錢丹皮一錢鬱金七分白芍一錢穭皮二錢苡米炒三錢芡實三錢參七一錢五分荷蒂二藕節二四時百病總有虛實即是血症一門犀角黃連石膏非不可用必有火症火脈實據者可施麻黃桂枝乾薑香附先賢有治血症者必有風寒束縛可施舍此有血脫益氣者黃耆人參開手可用有壯水制陽者有填精益髓者熟地杞子當歸鹿茸龜膠諸類何常非血症所宜有以胃藥救功者有固澀急止者要之有是症必有此藥不可熱亦不可濕也朱左據述此症瘀凝溫郁無疑今諸恙況能逐輕已有可愈之機藥餌不必過於著重只要寒暖小心不動氣惱勿多勞碌遠房事節飲食自然痊矣連節藕一兩連蒂青荷葉三枚丹參三錢馬料豆四錢磨三七五分沖服張左平素胃有濕熱又挾夏秋暑熱之邪熏蒸灼肺痰中似血非血無非濕熱所化鼻竅氣熱飲食減半都屬肺胃肺喜清肅胃喜清降沙參四錢麥冬三錢苡米三錢扁豆五錢赤苓一錢五分砂仁五分藕節一兩麥冬五錢大麥仁五錢香稻穗二支鮮蓮子十茉莉花二朵黃左形瘦脈弱痰中見紅切勿用寒涼以求血止而傷脾胃生生之氣黃耆六錢當歸一錢五分熟地八錢桑皮一錢茜草六分荊芥炒一錢荷蒂一藕節一王右失血盈碗更兼發熱今雖血止而熱未退脈數而甚於右寸關舌紅無苔此陰虧之質口鼻吸受炎暑干於肺胃兩經熱逼而血行於上茲汗出已多法當清養肺胃兼育陰擬四飲煎加減治之沙參四錢麥冬二錢川貝一錢五分生地八錢荊芥炭一錢扁豆三錢穭皮三錢竹茹一錢藕節一兩盛左失血腰痛雖以勞力有傷半由腎經不足之故生地一兩荊芥炭一錢杜仲三錢川貝一錢五分參七一錢紅花三分藕節二王右失血經久六脈細弱如絲時常內熱飲食減少氣血兩虧擬營衛並補八珍湯加杞子陳皮杜仲穀芽炮薑炭程右血止脈細如絲擬用儀煎以培氣血黨參四錢熟地八錢山藥三錢扁豆三錢生熟砂仁四分王左失血胃脈弦洪搏大慎防大發宜靜為要姑用犀角地黃湯暫清之鮮生地八錢犀角一錢丹皮一錢五分知母二錢竹茹炒二錢蘆根一兩陳左陽絡傷則血溢於上荊芥炭一錢當歸炒三錢續斷炒三錢生地炙一兩杜仲五錢金毛脊三錢參七沖一錢陳棕炭一錢地鱉蟲二錢沈左絡損見紅脈靜無妨擬用雙荷散取其行中有止鮮荷蒂三鮮藕節三陳棕炭一錢或加三七一錢楊左質本陰虧痧屬陽邪亦傷陰分為此腰痛無力今痰中帶血由來兩月不止肺絡亦傷宜金水同調洋參炒二錢麥冬炒一錢生熟地炙四錢川斛二錢萸肉一錢五分茯苓茯神一錢山藥炒四錢丹皮炒一錢扁豆炒三錢沙參二錢川貝母一錢蓮鬚三錢藕節一兩劉左屢經失血今血雖止而氣不能下納為此不可偃臥擬貞元飲治之熟地一兩炙草五分當歸醋炒二錢巴戟炒三錢天冬一錢青鉛一兩紫石英二錢如見血加荊芥炭一錢三七一錢五分沖服吳左屢經失血面色淡黃脈至細弱右寸關更見無力即不可見血即用寒涼先賢云血後宜與胃藥收功今宗其法黃耆六錢當歸一錢五分玉竹炒三錢扁豆炒三錢炙草六分紅棗三穭皮二錢元米湯代水十劑後加洋參熟地冬朮朱左失血雖止而津液耗傷矣北參三錢玉竹三錢扁豆炒三錢天冬一錢生地六錢當歸一錢藕一兩元米湯代水陸左自二月至八月兩次見紅今左寸尺獨見細澀此心腎兩虧之故也早服六味丸四五錢鹽湯下晚服天王補心丹四五錢紅棗十個穭皮二錢此二味煎湯下晨紅棗作點心華左失血身熱不已脈至細數無論左手有時歇止氣血大傷極重險症人事稍有不慎防意外之變玉竹炒四錢穀芽炒二錢熟地炙三錢扁豆炒二錢炙草四分紅棗三王右心生血肝藏血今失血成碗心胸不適法養心營和肝陽之劑當歸醋炒二錢白芍炒一錢丹參二錢川鬱金七分川貝一錢洋參一錢紅棗五藕節一吳左血見於上精遺於下心腎兩虧之症生地炭四錢熟地八錢當歸炭一錢五分炙草六分蓮鬚三錢芡實四錢洋參一錢紅棗五大紅山茶花一朵藕節三某左血止腰痛頭暈肝腎兩虧熟地四錢丹皮一錢五分荊芥炭一錢五分當歸二錢白芍一錢麥冬一錢杜仲四錢某左血後脈見和平可以漸愈然炎威之盛不可貪涼受風受寒為要洋參一錢麥冬一錢冬木一錢炙草五分茯苓一錢白芍一錢當歸一錢穭皮一錢某左血失於上精走於下宜乎頭痛腰痛也熟地一兩荊芥炭一錢川貝二錢丹皮一錢杜仲一錢菊花炒一錢五分牡蠣炒四錢何左失血後手足無力脈至關尺見數養其脾腎之陰則熱自退生地四錢丹皮炒一錢川斛三錢沙苑二錢沙參三錢炙草四分穭豆衣一錢五分宋左見紅心痛宜養心營洋參一錢五分丹參一錢五分紅棗五淮麥百粒蓮心二錢又種種見症亦屬水虧於下陽越於上幸而脈不見數弦諸凡小心可以無虞熟地炙八錢川貝一錢五分懷藥三錢甘菊一錢北參三錢扁豆炒三錢建蓮三錢吳失血後氣逆以都氣丸納之熟地一兩萸肉二錢懷藥四錢茯苓一錢五分丹皮一錢五分五味四分懷膝炒一錢五分青鉛一兩邊左近又失血左脈細弱右脈細數舌苔微黃先為清理上焦濕邪續投平補可也川貝一錢五分北沙參二錢元參一錢五分赤苓二錢苡米炒三錢紅花三分參三七一錢藕節二竹茹六分宋左清晨痰內見紅或出於鼻或出於喉此上焦浮熱耳沙參四錢麥冬一錢元參三錢生地五錢竹茹三分章右腰痛如折咳逆見紅傷於腎也熟地一兩當歸二錢懷藥三錢杏仁一錢杜仲三錢杞子三錢桃肉二紅棗三程右嘔吐屢發屢止咳嗽氣急骨節煩痛肺胃兩傷脈見細數尤血症之急所忌北沙參三錢扁豆炒五錢炙生地八錢懷藥炒四錢荊芥炭一錢廣皮一錢竹茹八分鮮車前草根一棵茅針花二錢汪右勞心勞力傷氣傷絡吐血成盆今血雖止過午發熱咳嗽不除面無華色左脈細數中空氣血兩虧勞怯之症調治不易急急自養還可漸漸應效六味丸加天冬竹茹枇杷葉陸左失血多年虛里震動此水虧無以制陽龍相之火不安其位擬八仙長壽飲以攝納八仙長壽飲加煅牡蠣五錢煎服王右心生血肝藏血今失血成盆心胸不適法當養心營和肝之陽當歸酒炒二錢白芍炒一錢丹參一錢川鬱金七分紅棗五洋參二錢川貝一錢藕節一張左頻年吐血不除肛瘍成漏不斂一身之氣奚堪延此剝削而不為傷損乎但誦讀耗氣勞神非有病所宜而房事不可不絶慎之慎之六味丸加天冬麥冬又綿耆炙六兩當歸炒三兩生甘草節二兩龜板四兩銀花二錢血餘炭三兩芽屑三兩豬腳殼炙存性十個陳棕炭一兩某左脈來三五不調失血後所忌神情倦怠食後胸腹不寬脾肺氣分有傷當此夏令乃傷氣之時偏不善守靜養須防再見吐血致多變幻洋參二錢熟地五錢天冬一錢懷藥炒三錢冬朮一錢紅棗三枚淋濁潘左淋濁雖久而脈左關尺數而有力舌苔灰黃兩乳腫塊溲難而痛純乎濕熱不清見症木鬱不主疏泄之恙未便補澀擬與疏通豬苓一錢澤瀉一錢赤苓三錢草梢六分車前子一錢五分山梔一錢萆薢三錢黃柏一錢通草七分烏藥一錢蓮子青心十粒又前投清疏滲泄之品已獲小效而脈見左寸關弦數較之他部有力舌根灰黃究屬肝家火旺而兼濕熱不清還宜直折以清肝膽龍膽草七分川連四分甘草梢五分當歸三錢赤苓三錢滑石三錢丹皮一錢五分鬱金七分車前子三錢木香四分燈心百寸次服細生地五錢赤芍一錢通草七分赤苓三錢黑知母一錢黑梔一錢甘草梢七分黃柏七分青皮七分燈心五寸後服中生地五錢丹皮一錢澤瀉一錢五分赤苓三錢懷藥三錢黑梔八分車前一錢五分萆薢三錢川楝子二錢草梢五分蓮子青心七粒又黃柏四兩淡鹽湯拌炒黃色研細豬脊髓十條置於碗內飯上蒸熱去膜將髓和黃柏末搗如膏作丸曬乾每日清晨用淡鹽湯送下二三錢王左下濁色黃而龜頭腫脹雖濕火下流亦由人事不慎邪甚未便固補且用革薜分清飲通因通用川萆薜三錢甘草梢一錢烏藥一錢澤瀉一錢五分滑石塊三錢通草一錢黃柏一錢車前子一錢五分蓮子青心十王右濕鬱化火小溲如膏黃柏實炒八錢山藥炒五錢豬苓一錢五分澤瀉一錢丹皮一錢赤苓三錢黑梔一錢蓮子青心十白果肉一個丁左證有從症不從脈有從脈不從症今脈細弱而淋濁之起馬口如刀割舌色白滑無非濕瀉下注況神色並無頓委情形而病不過半月未便澀固當從症治白朮炒三錢澤瀉炒一錢五分萆薢三錢赤苓三錢車前子三錢烏藥七分甘草梢五分芡實炒三錢杜仲三錢白果肉三錢華左白淫時滑始而宜通久則宜固洋參一錢蓮鬚三錢牡蠣煅五錢每日煎湯送六味丸五錢範左腎司二便艱澀雖因濕熱下注亦系氣不司化不禁雖因分泄太過亦由氣不固攝宗與補中有通通則中有補莫妙於六味方法生地五錢茯苓三錢澤瀉一錢丹皮一錢萸肉一錢五分山藥四錢苡米三錢建蓮帶心三錢生熟芽二錢又中下二焦濕熱不清舌赤脘痛作脹而兼淋濁先與二妙丸作湯加味治之蒼朮土炒二錢黃柏鹽水炒三錢黑山梔一錢姜一周右小溲艱澀而痛萆薢三錢赤苓三錢澤瀉一錢五分通草五分甘草梢五分滑石三錢燈心三十寸周左膏淋如濁溲痛而艱六脈細澀面色少神此腎真虛開合無權膀胱氣弱司化失職濕瀉阻塞水道所以不宣始而可以分消繼則疏補並行然後必當大補乃此症調治一定方法洋參五錢當歸三錢山藥三錢赤苓三錢烏藥七分砂仁七分廣皮一錢蘇梗一錢五分川膝炒一錢鮮萹蓄三錢鮮菊根三錢鮮車前子三錢白果連殼五粒馬濁精阻竅通草三分萆薢二錢澤瀉一錢五分甘草梢一錢黑山梔一錢牛膝二錢滑石二錢荊芥二錢燈心五寸楊左濕熱下注小溲混濁赤苓三錢牛膝一錢五分海金沙三錢萆薢三錢澤瀉一錢五分烏藥一錢草梢四分滑石三錢又所投分利雖然有效總之究屬腎真無納攝之權改商生料六味進之生地五錢懷藥三錢萸肉二錢澤瀉一錢五分茯苓二錢丹皮一錢蓮鬚一錢萆薢二錢任左精關不固濕濁未清宜通澀兼行五倍子炙三兩茯苓三兩為末煉蜜為丸每日清晨淡鹽湯送下三四錢鄒左濕濁阻閉溲數舌黃擬澤術湯培土分消冬朮三錢澤瀉鹽水炒一錢葫蘆巴炒一錢車前根鬚洗淨打三錢孫左溲後瀝精六味湯加蓮鬚三錢芡實炒三錢華左每大便時用力努掙則廷孔隨出精濁一二點已歷有年矣詢知素有胃寒吞酸得腥膩則驟作舌苔白滑脈至左關弦而帶數肌肉日瘦想由積勞傷脾氣不充足無疑統攝陰精便時氣益下注故精出也補中益氣湯加豬脊筋炙五倍子茯苓轉方加熟地劉左濕火歸於膀胱小溲艱澀而痛赤苓三錢滑石二錢澤瀉一錢五分草梢一錢銀花四錢萆薢二錢細生地三錢陳左左尺脈數陰精日夜滑泄此由君相之火交熾宜固宜清黃柏鹽水炒五分煅龍骨三錢生地八錢白芍炒一錢五分茯苓二錢萸肉二錢芡實炒四錢蓮鬚三錢炒山藥五錢金櫻子三錢沈左見色側戈望門流涕雖由腎真之不固亦由心氣之不足黨參炒六錢熟地一兩杞子三錢萸肉三錢鎖陽酒炒四錢巴戟炒五錢杜仲鹽水炒五錢山藥五錢菟絲子酒炒三錢益智仁煨一錢遠志炒七分五味五分舊筆頭一桃肉一某左血淋已久擬與加味逍遙柴胡四分白朮一錢五分赤芍丹皮一錢五分黑山梔一錢五分當歸三錢草梢五分赤苓三錢澤瀉一錢五分烏藥一錢車前子五錢吳童腹痛幾及兩旬按之無塊且驟按之則痛重按深按反不覺痛似非生痛傷之症凡瘍症輕按則痛輕重按則痛愈不能忍此言理也大凡輕按重按無二初按之而似痛久按重按而反不覺痛即得手按之陽氣氣血因之宣通所以痛亦暫止經曰通則不痛余於幼科一門未經暗練本不敢參贅然醫者意也色脈見症部位大小理則一也愚見似屬濕熱阻於小腸小溲因之淋痛蓋小溲雖由小腸而出非膀胱氣化則不通能今形瘦如削脈數無力飲食減少舌赤無苔不但氣虛血亦傷矣凡分利之藥傷陰者多清熱之藥傷胃者衆均宜擇用愚見如斯用擬一方質之高明裁酌可也生洋參一錢升麻三分麥冬一錢劉寄奴一錢洋參升麻能升清降濁麥冬養金生水通調水道寄奴專治腸中之病又能治小溲淋閉此虛中挾邪之治法川通草八分桃仁一錢當歸一兩血珀五分黑梔五分懷膝三錢烏藥七分鮮車前草連根鬚葉五錢沒藥四分蟋蟀三隻杉木梢三鮮菊花根鬚三錢鮮韭菜根鬚二錢鮮橘葉一錢沈肝用失藏腎真失固時而小溲不禁熟地四錢丹皮一錢山萸懷藥二錢白芍二錢當歸一錢五分桑螵蛸一錢杜仲三錢洋參一錢牡蠣煅三錢陳左濕熱下注為淋為濁先為通利續商固補滑石二錢赤苓三錢川通一錢生草五分萆薢三錢澤瀉一錢五分蓮鬚三錢鮮車前草連根鬚葉五錢陶左些小濕熱下注何必大攻大伐以致氣血有傷若不急停猛藥非惟無益適足以有害也生地甘草雲苓銀花當歸加姜一棗三高右帶下頻頻時時內熱六脈軟弱氣血兩虧用擬八珍以補營衛八珍湯加焦神麯原杜仲焦穀芽薑棗

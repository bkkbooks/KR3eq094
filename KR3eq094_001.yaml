body:
  text: 卷一時邪蔣左初愈之體氣血未充衝風踐寒焉得不乘虛而入近見夜間發熱得汗則減而太陽連頰作痛純是客邪見症且先略為疏解玉竹炒三錢前胡八分川貝一錢北參三錢荊芥六分川芎五分防風五分丹皮八分山藥四錢生熟穀芽四錢連須蔥頭一枚蘇右風溫上受於少陽陽明口內牙齦碎爛連及左畔咽喉外而頭面胸膈浮腫色紅此乃大頭瘟之屬為症不輕且清少陽陽明之邪柴胡五分葛根一錢川連四分黑梔一錢薄荷二錢元參三錢鮮石斛三錢甘草一錢射干一錢銀花八分牛蒡一錢馬勃五分荊芥二錢防風一錢竹葉二十片燈心五寸蘆根八錢楊左無汗而見寒熱面赤咽紅喉痛脈至浮數而尺無力症屬虛體挾邪至於遍體痰癧此係舊恙茲且緩圖先為清理客邪柴胡四分黑梔一錢五分薄荷一錢牛蒡三錢澤瀉一錢歸身三錢元參三錢連翹二錢甘草一錢黃芩一錢赤芍一錢大貝三錢生地五錢石決六錢防風一錢夏枯草一錢竹葉二十燈心五寸吳左邪陷心營神昏似睡六脈細微欲絶已現脫象勢在朝不保暮不忍坐視勉商竹葉黃耆湯加減取其托透兼施盡人事以待天黃耆一兩洋參一兩熟地二兩懷藥三兩大豆卷三錢車前子四錢遠志炒一錢琥珀一錢生地一兩另用鶴珠五分犀黃一分研細末沖服棗仁一兩茯神三錢川芎八分神麯炒一錢甘草五分犀尖沖一錢菖蒲五分竹心一錢又診原方加白芍六錢五味一錢芡實一兩鉤鉤一兩石決一兩龍齒煅五錢兩頭尖二錢金箔五張肉桂三分羚羊一錢去川芎甘草琥珀犀角竹心又診神識有時模糊有時清楚大便亦減苔帶黑色六脈漸起生機已轉黃耆一兩黨參一兩生熟地各二兩懷藥三兩大豆卷三錢車前子炒三錢遠志七分棗仁一兩茯神二錢白芍炒四錢五味子五分芡實一兩大麥冬三錢黑梔一錢川連五分洋參一兩牡蠣五錢北沙參三錢生熟草一錢陳皮二錢元參一錢丹皮一錢五分燈心五寸竹心一錢凡瘧非必盡屬少陽十二經俱能令人瘧今寒從足起脈見細數舌尖彌紅苔色帶黃此肝腎之陰素虧伏邪乘虛內戀法當育陰透解生地五錢丹皮一錢五分澤瀉一錢五分懷藥四錢茯苓二錢柴胡三分當歸三錢陳皮一錢五分懷膝二錢洋參一錢五分生鱉甲三錢赤首烏四錢生熟穀芽六錢形寒飲冷則傷肺寒能澀血邪閉皮毛肺居上脘為此胸膈作痛氣急無汗舌色邊紫苔白脈見浮弦而緊理當溫散得汗便有轉機否則難治麻黃七分官桂八分當歸三錢白芥子炒一錢五分萊蔔子炒一錢五分蘇子炒一錢荊芥炒一錢五分茅朮炒一錢通草五分蔥頭二姜三寒束於表為發熱頭疼骨節煩疼無汗而時見怯寒熱伏於裡為舌燥干而舌心欲黑神情似醉熱邪不得外達有內陷之象須防昏厥痙變且商涼透一法以冀邪從外達方有轉機薄荷一錢五分黑梔一錢川連三分黃芩一錢丹皮一錢五分麥冬二錢知母一錢犀角一錢燈心一尺竹葉一錢姜皮六分錢左脈至右寸關浮滑而大此為痰火蒙閉清竅神識模糊言語不清痰壅絡脈仰臥如尸不能轉側左脈見數症屬溫邪內戀以正氣不足無力散邪外達留於中焦勢成棘手勉商涼透解托之法以冀百一竹心一錢茅根六錢蘆根一兩鮮菊葉三錢銀花三錢花粉一錢黃芩一錢犀角沖一錢洋參四錢六一散三錢生熟穀芽二錢北沙參六錢加珠子一錢犀黃一分上藥研末和竹油半杯衝於藥內另將紫雪一錢用竹心燈心菖蒲泡湯於未服之前緩緩與服又診投涼透解托轉則自如知飢進谷津津有汗遍體俱到邪能外達此生機也但虛人善變調理不可不慎原方加硃砂拌茯神一錢五分錢左咳吐紅痰左脅下痛不可忍氣急不能下臥脈數甚於左寸關舌紅苔黃晝夜不寧反周日矣此係暑風感於厥陰少陰重險症也川連六分羚羊一錢連翹殼三錢石決六錢荊芥一錢前胡一錢洋參二錢防風一錢蘇子一錢五分六一散三錢夏枯草二錢竹葉一錢燈心五寸此方一劑熱退脈平納穀紅痰亦可不吐錢右舌黃微寒壯熱右三部脈至無力而細左三部略大於右按之亦空此體虛氣不足更受暑邪氣愈傷矣急急固症清暑勿施破散洋參五錢大冬二錢青蒿梗一錢川貝二錢六一散三錢扁豆三錢通草五分竹心五分燈心五寸蘆根五錢荷梗一尺又診脈來兩手較昨略為有神病勢大減原方加洋參三錢生熟穀芽四錢某素有目疾肝陽獨熾犯胃則常常嘔吐酸苦今又寒熱更挾暑風濕熱擬與小柴胡吳萸湯四苓散三合宗古法柴胡四分黃芩一錢洋參三錢豬苓一錢澤瀉一錢吳萸三分赤苓三錢車前二錢通草一錢陳皮一錢砂仁八分六一散三錢川連二分生薑一王脈至右大於左骨節時時疼痛舌紅起點此暑風挾濕濕鬱化火之象祛風清熱分泄香薷一錢防風一錢秦艽二錢木瓜一錢赤苓三錢六一散三錢黃芩一錢苡米四錢桑枝葉陳脈至左關獨弦胸脅痛寒熱咳嗽表有風寒里有木鬱柴胡四分陳皮一錢青蒿一錢半夏一錢茅朮炒一錢杏仁一錢五分防風一錢當歸三錢炙草四分白芍炒一錢降香五分許左久咳形瘦之軀脾肺兩經已傷再行勞倦時令之邪乘虛襲人發熱不已脈至浮數而甚左寸厥厥動搖舌苔隱隱黑色有走心胞之勢須防化燥神昏之劇險甚險甚擬與涼透泄勢法留候明眼定裁豆卷三錢連翹一錢山梔一錢元參四錢丹皮一錢五分川貝一錢五分玉竹五錢竹葉一錢燈心五寸茅根去心三錢錢左冬溫犯於肺胃氣急咳嗽舌黃滿布而帶干苦口渴喜飲胸膈不寬須防加重化燥荊芥一錢當歸三錢葛根一錢貝母三錢玉竹六錢白薇一錢香附五分竹葉二十片又診據述病勢昨減輕然有汗而脈數不退門齒乾燥舌尖紅起刺指掌手腕厥冷此係邪陷營陰熱彌厥亦彌惟恐正不敵邪至有痙厥之變扶正涼透急急進之三日內齒潤津回脈數能減還可有望加重則危玉竹八錢白薇一錢川貝二錢洋參五錢麥冬二錢丹皮一錢五分連翹一錢黑梔一錢生地一兩穀芽二錢竹葉一錢燈心五寸姜皮八分蔥一又溫邪內陷劫液傷陰齒燥唇乾舌焦起刺脈至左關尺弦細而數右寸關浮大按之無力此所謂少陰不足陽明有餘也論脈症玉女煎似屬相宜但渴不引飲而脈不實未敢擅投勉商扶正育陰之中兼涼透甘寒一法希圖津回液轉原方加甘草四分元參三錢知母二錢豆卷三錢犀角一錢花粉一錢扁豆二錢蘆根一兩茅根八錢菖蒲四分去玉竹白薇姜皮蔥又汗雖未遍熱勢減去五六脈數略為有神聲音不揚氣弱也大便溏泄然一虛至此而不肯服藥者有何可恃乎洋參一兩生地一兩五錢懷藥八錢陳皮二錢扁豆六錢生熟草六分車前子二錢白芍炒三錢黑梔五分元參二錢麥冬二錢生熟砂仁六分生熟穀芽三錢竹心一錢燈心五寸又熱勢稍退脈數略為平和然左三部微細欲無尺脈更甚肝腎之陰大虧水不上承所以舌乾而津難回也未可恃以無恐方仍扶正育陰涼透之法得托邪外達可望轉機如羈於內變症不測生地一兩六錢洋參一兩二錢生懷藥一兩扁豆六錢麥冬一錢五分丹皮一錢五分甘草四分豆卷四錢穀芽三錢北沙參三錢白芍二錢車前二錢陳皮二錢桔梗四分元參三錢神麯炒四錢菖蒲三分燈心五寸竹心一錢建蓮去心五粒又診津回液轉熱勢未能全退脈還未能和平仍要極其小心倘人事稍有失宜極易生變不可不慎方不外前法前方加澤瀉一錢前胡一錢蟬衣四分又祖二十四味流氣飲方法洋參一兩五錢生地一兩八錢麥冬一錢丹皮炒五分甘草四分扁豆一兩二錢元參一錢五分懷藥一兩八錢車前一錢五分北參四錢白芍炒二錢五分桔梗五分陳皮二錢神麯炒一錢萸肉炒一錢五分澤瀉一錢茯苓一錢棗仁炒二錢地骨皮一錢浮小麥二錢建蓮炒三錢生熟穀芽六錢桑葉二燈心五寸上方二十餘劑而減輕分兩又服二十餘劑而痊林左風溫挾濕漫布三焦上為耳聾中為嘔惡下為溏泄脈至模糊須防化燥神昏之變製半夏一錢茅朮根四錢陳皮一錢五分赤苓三錢薄荷一錢五分滑石三錢砂仁八分竹茹一錢澤瀉一錢胡左大瘧已久近日似有減輕之意忽然初一日寒熱加重隱隱透痧未能周遍六晝夜來熱還不止氣逆喘嗽便溏不止胸膈痞悶顯系肺胃風溫之邪不清所嫌脈數大而無倫舌尖之上現出紅如指一點此邪欲走入心胞之勢倘若化燥昏迷為害即難言者刻下偏寒偏熱偏補偏溫均非所宜且以透泄內蘊之邪一法竹葉一錢梔子一錢翹心一錢丹皮一錢車前子一錢五分麥冬一錢北沙參三錢桔梗八分蘆根五錢燈心五寸甘草三分又昨投透泄內蘊之邪一法今早舌尖之紅色退淡而右脈數大之形略減清晨便溏一次似乎稍有應效舌根苔黃垢膩門齒乾燥胃家濕濁未清肝腎之陰受灼恐其液涸仍宗前法再投原方加通草三分赤苓二錢西湖柳二錢晚間加南沙參五錢又熱勢已退七八脈數減去五六但虛人善變寒暖飲食不可不小心南北沙參一兩麥冬一錢丹皮一錢梔子一錢甘草三分穀芽一錢車前二錢桔梗五分赤苓二錢通草三分扁豆一錢五分蘆根六錢竹葉十片燈心五寸西湖柳二錢許右暑傷氣分神情倦怠邪走心包昏迷似睡脈至左寸獨大其餘少力少神起病即見目盲者肝腎之陰傷也今按臍震動如梭龍相之火不能潛藏窟宅飛越乎上恐有厥脫之虞勢在危險無從下手然坐視不救亦非仁者之心勉商壯水育陰以制肝腎之虛陽妄動輕靈護托以泄心胞之暑邪蒙閉倘得神情清爽乃是轉機甘菊二錢鉤鉤八錢石決一兩生地一兩白芍一錢黑梔一錢洋參五錢棗仁五錢川貝二錢茯神三錢遠志七分麥冬二錢羚羊一錢薄荷梗一尺硃砂一分犀尖一分研細末用竹油十匙前藥沖服蘇左病起寒熱由來月餘近日但熱不寒舌底紅而苔黃口渴喜飲而不多胸膈拒按小溲短數大便經旬不解邪從少陽已入陽明之經漸次感及於臍恐有化燥神昏之變然其病已久實屬陰虛今當清透葛根一錢五分黃芩一錢黑梔一錢知母二錢陳皮一錢五分花粉一錢五分瓜蔞仁二錢川貝一兩洋參二錢蘆根一兩竹茹一錢燈心五寸竹心一錢惠右有汗而熱不退邪不在表大便溏泄頭目不清中脘不適溫邪瀰漫三焦走入心胞須防神昏發厥之劇洋參二錢元參三錢甘菊一錢山梔一錢黃芩一錢甘草三分蘆根八錢燈心五寸竹心一錢戈左舌尖微紅白苔滿布口渴不喜飲冷小溲短而熱此係風溫挾濕瀰漫三焦可慮者有汗而熱不解脈來洪大搏指病勢方張非但不能退還恐增重擬用分清稍佐涼透一法通草一錢滑石三錢赤苓二錢陳皮一錢豬苓一錢澤瀉一錢連翹一錢薄荷一錢黃芩一錢五分青蒿梗一錢茅根六錢竹心又昨晚渴而飲多今脈象雖不歇止而右三部仍還數大舌苔垢膩不化漸見微黃小溲略長而赤瀰漫之濕熱仍然急切不退漸漸蒸及陽明之經惟恐變端蜂起擬竹葉石膏湯合四苓加減一以清肺胃之熱邪一以祛蒙閉之濕濁黃芩一錢五分連翹三錢滑石三錢通草一錢澤瀉一錢枳實四分薄荷一錢竹葉一錢麥冬一錢五分洋參三錢石膏四錢陳皮二錢半夏一錢赤苓三錢生熟砂仁八分竹茹八分燈心五寸姜渣四分香粳米一撮又昨午戰汗後神情稍清渴亦略減但舌苔膩仍然脈至右關數大如前邪戀於中未能盡徹難保不有更變未可恃以無虞恐濕濁如此瀰漫非四苓不可右寸關洪大有力且面油渴飲非肺胃蘊熱而何竹葉石膏亦在所必用前方加辰砂六一散三錢車前子一錢五分去滑石王右溫邪內閉症見痞滿燥實勢在不得不下但勉下
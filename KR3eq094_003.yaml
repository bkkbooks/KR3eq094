棗一許面色淡黃無神脈軟而少力痰之多者良由脾不運化主以培土乃治痰之本也六君子湯加生薑一劉右脾虛挾濕兼以操撈茅朮一錢白朮炒一錢五分穀芽三錢生熟砂仁八分廣皮一錢半夏一錢香附一錢赤苓二錢丹參三錢玫瑰花二朵何右中脘結塊作脹作痛良由氣積交凝補其脾土則塊自除不必過於攻消恐未必有益而反有礙於正氣也甜冬朮三錢廣皮一錢生熟砂仁四分枳殼三分香附一錢當歸二錢蘇梗二錢邊僧木犯土位土衰則運化失職中宮所以痰多大便所以時溏也小朴薑汁炒一錢廣皮一錢五分茅朮一錢半夏一錢黨參四錢炙草三分甘松一錢赤苓三錢澤瀉一錢楊飲食不節致多胸腹疼痛議與健脾消導焦芍二錢焦殼五分焦楂一錢五分焦曲一錢焦麥芽三錢熟砂仁炒六分木香四分袁左形瘦便溏腹脹脾氣衰也脈來細數無力內熱不已肝腎陰虧也經曰治脾妨腎治腎妨脾此症是也勉商一方冬朮炒五錢焦穀芽一錢焦曲一錢五分苓皮四錢大腹皮二錢車前子一錢五分鮮冬瓜皮四錢又六味丸加白芍晨服某左久咳傷及於土脾胃衰而納減黨參二錢冬朮二錢茯苓一錢五分炙草四分廣皮四分製半夏一錢薑一棗二黃瓜霜治一切虛火咽喉諸疾或口舌碎爛吹之效硼砂五十文元明粉五十文白礬五文黃瓜二條夏月將瓜扣空止氣藏瓜內結霜冰片等分與霜和勻吹

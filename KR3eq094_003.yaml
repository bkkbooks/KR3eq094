body:
  text: 卷三疝周臥則安撑則痛或在少腹或攻胸肋或連腰脊或帶小便難不定者氣也炎上者火也法當瀉肝佐清金肺生熟延胡二錢川楝子二錢南沙參四錢杜仲三錢澤瀉一錢焦茅朮七分細青皮八分黑梔三分木香三分梅疝南沙參二錢木香四分當歸三錢川楝子三錢延胡炒二錢小茴香炒六分荔枝核二錢橘核炒二錢又洗方艾一兩蔥一兩紫蘇一兩木香一錢官桂二錢上藥煎濃每日臥時熏洗洗後隨即小解一次陳腎子右大於左厥陰經之氣分著寒荔枝連殼四十九個每個中入鹽少許將黃泥裹置礱粳火內煨一宿取出剖開成炭者可用再用煨木香八錢大茴香一兩上三味共為末將豬尿胞一個煮爛和藥末搗丸每日清晨薑湯下三錢某寒邪歸於厥陰而成疝氣當歸四錢小茴香煎湯炒一兩大茴香二兩川楝子三兩木香五錢官桂五錢荔枝核二兩上為末用豬水胞二個煮爛為丸薑湯下三錢某腿內側中行而艱伸腎子紅腫厄逆頻頻舌黃口渴此係厥陰犯胃倘若攻心變端不測旋覆花包三錢半夏一錢五分陳皮一錢五分吳茱萸三分赤苓四錢甘草五分連翹五錢赭石五錢杉木梢一兩檳榔二錢洋參二錢竹茹一錢真橘葉二錢吳疝氣本系寒邪入於厥絡近見攻衝作痛嘔吐泄瀉者乘脾犯胃也白芍炒二錢甘草炭四分生熟砂仁一錢製半夏一錢陳皮一錢五分白朮炒二錢防風一錢車前子二錢烏藥炒一錢焦神麯一錢木香炒四分殷睪丸腫脹臥則入腹行則下墜所謂狐疝寒氣沵入厥陰川楝子炒三兩小茴香炒四兩煨木香一兩當歸酒炒五兩荔枝核一兩枸杞子三兩鹿角霜一兩蜜丸每日清晨陳皮湯下又洗方蛇床子艾紫蘇小茴香各一兩官桂五錢朱濕疝川斷三錢川膝一錢五分茅冬朮炒三錢烏藥一錢木香五分荔枝核炒一錢唐寒入厥陰氣因而降當歸四兩小茴香煎湯炒木香煨一兩杞子炒四兩泡薑五錢川楝子三兩上為細末蜜丸開水下四五錢曹厥陰之絡循繞陰器疝氣自篡際痛及少腹犯胃便溏舌白脈來右關獨見弦象擬溫通疏泄小茴香一錢川楝子炒二錢茯苓一錢青皮一錢烏藥一錢吳茱萸四分木香四分沉香三分張寒入厥陰而成狐疝小茴香炒一錢吳茱萸六分烏藥六分青皮一錢五分川楝子二錢元胡索二錢當歸酒炒五錢皮桂八分赤苓二錢余厥陰之絡環於陰器偏於左者為崑崙偏於右者為疝氣今兩者都兼左右者陰陽之道路也氣血俱病用藥宜和不可偏著所最畏者攻心之劇幸脈象靜而不動還可無妨而於惱怒寒涼均宜戒慎當歸四錢枸杞子三錢青皮五錢吳茱萸三分蘇梗三錢元胡二錢烏藥二錢桃仁一錢木香四分紅帽幃一錢降香四分朱寒入厥陰小茴香一錢五分當歸三錢烏藥一錢五分川楝子一錢五分元胡一錢五分木香四分吳茱萸四分荔枝核二錢楊少腹痛連睪丸脈至沉遲細弱此寒邪犯於厥陰衝犯中宮作脹作嘔治以平肝養胃吳萸三分茯苓四錢廣木香四分小茴香炒七分荔枝核二錢砂仁薑汁炒六分萊蔔子炒三錢穀芽三錢又丹溪云上升之氣多屬於肝至於大便艱難小便短赤乃是營分不足風木之橫逆良由水不能涵木以潤以通投其所喜淡蓯蓉三錢牛膝鹽水炒二錢黑芝麻三錢柏子仁一錢五分歸鬚二錢川貝四錢川楝子炒二錢延胡索二錢又以潤以通宿垢得下脹悶從此或可漸退今當培土平木為治黨參炒冬朮炒茯苓炙草廣皮焦神麯生熟砂仁濕僧六淫之中惟寒惟濕為最重閉結中焦為痞散於肌表為骨節煩疼擬用胃苓加減焦茅朮一錢澤瀉一錢赤苓二錢桂枝皮三分陳皮一錢川朴四分神麯炒一錢防風一錢殷左脈滑甚於右關食後脘中似覺滿悶夜不能臥究由濕濁停痰注於陽明胃不和則臥不安也洋參三錢半夏一錢五分白朮炒二錢神麯炒一錢茯苓二錢陳皮一錢砂仁八分當歸三錢大麥仁炒四錢秫米炒三錢某左土衰濕勝一切見症虧在脾土土衰則肝木來侮土衰則濕之害迭出矣防風一錢半夏炒一錢焦白朮三錢陳皮一錢赤苓二錢柴胡三分苡米三錢砂仁芡實炒三錢生熟芽四錢某濕有因脾不宣運者有因腎氣衰弱陽不能化濁陰泛濫者一宜培土一宜補腎又有寒濕外侵者濕熱內閉者一宜溫通一宜涼泄此當分消又有五臌至末傳俱變為水者此屬敗症不治亦要留心此當脾胃合用黨參六錢萊蔔子一錢茯苓一兩肉桂一分麥冬一錢車前四錢牛膝炒二錢另用金匱腎氣丸四錢麥冬一錢煎湯晨服虞右閲所服方藥散攻下得汗則解俱不應手今身熱不退脈來弦數左寸關尤甚而脘痛徹心上支左肋不可著手然按之中空舌邊苔白中心灰黑起刺此屬濕遏熱伏而兼木鬱邪阻中焦氣機無由升降不通則痛也內非實結外非風寒不得以傷寒六經論治議與清泄疏利法川連七分吳萸三分黑梔一錢赤苓四錢川通草一錢防風一錢川金七分元胡一錢燈心五尺菖蒲三分又上方一劑而左寸數象大減二劑六脈弦數不若前之盛矣惟脘痛不除改用宣絡理氣法桔梗一錢桃仁一錢廣鬱金一錢青皮八分木香三分穀芽二錢竹葉十張燈心五寸元胡一錢五分一劑而痛去安睡一夜清晨思食矣項左濕鬱化火舌苔灰黃骨節煩痛足膝尤甚步履少力治濕當以健脾為主理氣為先四苓散加廣皮牛膝防風茵陳桑枝各五錢桑節一兩秦左土不勝濕納穀減而不貪兼感暑風時而發熱脘痛擬用培土分消芳香解渴製半夏一錢廣皮一錢砂仁一錢小朴七分焦茅朮一錢赤苓三錢滑石二錢熟穀芽二錢香茹四分又原方加扁豆三錢蔻仁二茉莉花十朵去滑石小朴香茹腳氣某右右足遊火內攻上逆腿為壅腫小溲艱澀舌上焦乾津液被灼所嫌脈細模糊陽症而見陰脈症之所忌用藥殊難勉商從症而不從脈之例立方但腳氣一門每有攻心之變不可不慮銀花一兩黑梔一錢翹心三錢丹皮一錢五分懷膝一錢五分元參五錢燈心五寸蘆根一兩緑豆一兩又津液漸回痛亦稍減但腿腫如故仍難舉動未可恃以無恐方宗前法川石斛五錢牛蒡子三錢燈心五寸蘆根一兩緑豆一兩銀花一兩黑梔一錢五分連翹五錢丹皮一錢五分牛膝一錢五分元參五錢又身熱減津液回大有轉機上中二焦之邪火已清七八下焦之濕熱未楚腫脹為此不退銀花一兩山梔炒一錢五分丹皮二錢連翹四錢牛膝一錢五分川斛一錢五分燈心五寸蘆根一兩又原方加黃柏鹽水炒一錢羚羊片一錢獨活一錢秦艽三錢曹左小腿漫腫腳氣也須防上逆攻衝川萆薢三錢漢防己二錢滑石三錢宣木瓜一錢苡米一兩獨活一錢牛膝三錢焦茅朮一錢杉木梢一兩防風一錢痹周左血虛寒濕入於節骱木瓜一錢五分虎骨炙四錢沒藥一錢松節一兩羌活一錢獨活一錢五分防風一錢白芷一錢桐皮二錢牛膝二錢紅花五分當歸八錢秦艽三錢杜仲四錢桑枝酒炒一兩威靈仙一錢陳右遍體作痛脈來遲滯風寒濕三氣合而成庳羌獨活各一錢當歸五錢川芎一錢杜仲四錢牛膝二錢紅花四分靈仙一錢海桐皮二錢茅朮炒一錢防風一錢乳香一錢桂枝四分木香桑枝酒炒一兩陳松節一兩蘇風行無定挾濕化熱遍體骨節煩疼左關弦數治風以養血為先治濕以理氣為先防風二錢秦艽二錢羌獨活二錢苡米五錢木瓜一錢五分當歸六錢羚羊一錢杜仲五錢沒藥一錢靈仙五分炙草四分桑枝一兩松節一兩蔣左風寒濕三氣乘虛入於肝腎而成痹但濕化火寒已化熱純乎剛猛之藥宜避熟地一兩防風一錢五分苡米一兩秦艽二錢獨活二錢川斷三錢杜仲八錢丹參三錢山藥三錢白朮三錢牛膝三錢木瓜一錢五分虎骨四錢沒藥一錢桑枝一兩松節一兩秦左腎虛而風客之下體骨節無處不腫足跟亦腫擬獨活寄生加減補中取散杜仲五錢川斷三錢桑節五錢竹根炙一錢獨活一錢防風一錢當歸三錢熟地八錢秦艽三錢牛膝二錢木瓜一錢五分狗脊四錢陳左痢後餘邪未清流入關節為腫為痛還宜疏解柴胡一錢羌獨活各一錢前胡一錢防風一錢荊芥一錢川芎一錢白芷一錢紅花四分連翹四錢當歸三錢牛膝二錢木瓜一錢五分羚羊一錢神麯炒一錢桑枝一兩木香五分沒藥五分許左風寒濕乘虛入於肝腎絡脈兩腿痠疼入夜尤甚熟地一兩川斷三錢當歸四錢黨參五錢萸肉三錢杜仲一兩秦艽二錢苡米一兩木瓜一錢五分獨活一錢防風一錢肉桂五分虎骨四錢山藥五錢芡實五錢冬藤五錢蓮鬚一錢周右骨節雖痛不腫不熱不紅此血不營筋治不可作有邪論況脈來細弱此為血虛之據川芎七分熟地四錢白芍炒一錢當歸炒三錢紅花三分杜仲三錢澤瀉一錢杞子三錢桑枝五錢某右痛而不定者為行痹左關獨見弦大而浮五行之中風行無定風熱入肝為此諸節骱痛無定處也柴胡五分當歸五錢白芍一錢茯苓二錢乳香一錢丹皮一錢黑梔一錢防風一錢木瓜一錢五分白朮炒一錢五分桑枝節各一兩生熟甘草六分強左風溫濕入於絡脈氣血不能宣行秦艽二錢防風一錢苡米三錢木瓜一錢川斷二錢杜仲三錢紅花三分木香三分桑枝三錢朱右風寒濕入於手足節骱此厲節風也調補氣血之中佐以祛逐之品冬朮三錢當歸三錢羌獨活各一錢杜仲八錢桐皮一錢五分丹參三錢防風一錢牛膝二錢木瓜一錢五分桂枝四分乳香一錢桑枝節各一兩吳左風寒乘虛襲於骨骱肝脾腎雖虛邪還未盡擬補中兼疏法黃耆酒炒四錢當歸五錢秦艽二錢桐皮一錢五分川斷二錢獨活八分苡米一兩丹參三錢熟地八錢杜仲一兩防風一錢木香三分紅花三分虎脛骨四錢沒藥五分冬朮三錢桑枝一兩筍緶五錢松節五錢邵左不乳不腫不紅熱六脈細軟無力而周身作痛調和氣血為主稍佐溫通絡脈黃耆五錢當歸六錢杜仲一兩茅朮一錢虎骨四錢金毛脊四錢大小茴四錢木香四分川膝二錢桑枝一兩荔枝核三個某不腫不紅病不在肌肉可屈可伸病不在筋骨今見咳嗽腿外側痛而定蓋肺為氣之臟咳則肺氣不宣則絡脈不暢腿外側所以痛而牽引也白鳳仙梗五錢茯苓中術二錢桑枝五錢沒藥一錢懷膝二錢忍冬藤五錢黃左肝脾腎三經虧損風寒濕乘虛襲入而成行痹今歸兩膝腫痛步履艱難腰間亦痛六脈細弱法當補中兼疏黃耆八錢當歸四錢冬朮三錢苡米一兩川斷三錢秦艽三錢防風一錢獨活一錢杜仲一兩木瓜一錢五分芡實三錢肉桂三分陳皮一錢五分沒藥一錢桑節一錢茯神中木三錢王右風客節骱手足屈伸不能舒展且兼腫痛年高之人不可純用祛風佐以氣血兼培庶乎穩當羌獨活各五分當歸五錢黃耆三錢秦艽一錢五分木瓜一錢五分杜仲五錢乳沒藥各一錢五分虎骨四錢松節五錢桑枝五錢王左一身上下俱痛風寒濕入於太陽羌活一錢防風一錢秦艽三錢當歸酒炒五錢黃耆酒炒六錢海桐皮二錢苡米四錢薑黃一錢桂枝八分沒藥五分杜仲薑汁炒五錢桑枝一兩虎脛骨炙四錢又浸酒方羌活防風秦艽當歸黃耆海桐皮苡米薑黃桂枝虎掌骨炙桑枝杜仲獨活川斷冬朮木瓜桑節何左骨節腫痛左關數有力此濕火流於營陰宜用養營清泄當歸八錢木瓜二錢秦艽三錢苡米一兩杜仲一兩羚羊一錢乳香一錢防風一錢桑枝五錢桑節五錢宗左寒濕下注二足無力而痠疼獨活一錢杜仲炒三錢川斷三錢當歸三錢白朮炒三錢秦艽三錢木瓜一錢五分萆薢二錢朱風入節骱為腫為痛羌獨活各一錢五分杜仲炒三錢川斷三錢當歸八錢秦艽三錢赤苓二錢牛膝二錢桑枝一兩川石斛二錢秦艽三錢松節一兩錢左肢節時浮攣痛頻作倏忽流走無定足跟湧泉穴
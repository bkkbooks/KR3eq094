三分車前子二錢白芍炒三錢遠志炒七分益智仁八分神麯炒一錢肉果煨一錢山藥三錢煨木香四分又擬酸甘化陰澀以固脫之法白芍炒三錢赤石脂煅三錢龍骨煅二錢訶子肉煨一錢炙草三分五味子六分御米殼炙二個蒲左腹滿跗腫左弦右弱納減便溏中虛之象舌白滑濕淫之徵擬用四苓以培土分消但症非輕不能節養恐其加重茅朮三錢豬苓一錢五分澤瀉一錢五分赤苓三錢焦神麯一錢劉左攻痢丸散無不傷中腹雖少寬兩足腫脹未減難保無上泛之虞姑用小溫中丸每日服四錢十劑後再商王左上有表邪咳而見血下有濕濁兩足腫脹邪不能解濕不能利恐成風水生苡米一兩五錢連皮赤苓五錢滑石五錢防風一兩荊芥炒一錢五分青桑枝皮鹽水炒一錢五分通草一錢五分車前子三錢又原方加竹茹一錢茅針花一錢馮右木侮土衰氣虛下陷腹脹筋露肌肉消瘦脈細弦徑症勢重險擬扶脾陽兼以平木為治黃耆元米炒冬朮陳皮炒升麻柴胡洋參炒白芍炙草腹皮車前鹽水炒木香煨草果仁老蘇梗趙左風水逆走膚腠並夾面積致成腫脹惜乎日數已久體虛難效耳通草三錢車前炒一錢蘇梗一錢郁李仁二錢東壁土一兩煎湯代水又方生茅朮一錢萊蔔子炒一錢川朴鹽水炒一錢苓皮六錢陳皮二錢腹皮酒炒二錢澤瀉炒一錢神麯一錢楂炭二錢枳殼八分防風一錢五分紫蘇一錢薑皮六分又原方加冬朮三錢徐左寒水侵脾風邪入肺以致喘咳為腫生茅朮二錢赤苓八錢澤瀉一錢五分豬苓一錢五分車前鹽水炒五錢通草三錢紫蘇一錢郁李仁一錢防風一錢加東壁土一兩楊左能食不運脹起中宮便時腹痛且先健運脾土神麯一錢五分麥芽三錢枳殼炒三錢楂肉炒三錢焦茅朮七分蔡左中氣不運腹為腫脹便溏不為稍寬六脈細澀症屬棘手生茅朮一錢五分生冬朮二錢川朴一錢枳殼六分苓皮四錢通草二錢滑石三錢陳皮一錢五分草果五分車前三錢神麯一錢腹皮一錢又甘遂二兩大戟二兩芫花二兩蘆巴四兩為末醋調敷邵左膀胱無司化之權小水不從水而出漬於下而泛及中焦腹為之漸滿脈至三五不調細澀無神陽氣之衰不待言矣所投補中與八味頗覺相宜但水勢橫逆惟恐後不濟事茲且開通膀胱之水能得順趨而下急則治標之法擬方候酌生茅朮茯苓豬苓澤瀉肉桂陳皮腹皮蘇梗赤豆麥芒椒目又兩投分水小溲數而短赤昨又發熱惡寒此是暑風外襲於表宜兼疏解香薷一錢通草三錢滑石三錢車前炒五錢王不留行三錢東壁土一兩又原方加黨參五錢又生茅朮二錢茯苓一兩澤瀉二錢肉桂四分熟附五分冬朮一兩滑石三錢枳殼四分桂枝五分黨參一兩赤豆六錢磨沉香三分又屬屢投分泄而小水不去不獨膀胱不能化而且腎氣亦不開合商滋腎法以通關節黃柏炒一錢知母鹽水炒一錢肉桂五分茯苓一兩此方先服晚服濟生腎氣丸四錢夏左風為六氣之長善行而數變膚腠不密著之則遍體浮腫法當疏泄手太陽之經蟬蛻十隻地骨皮三錢桑白皮二錢苓皮五錢薑皮六錢陳皮二錢防風一錢荊芥一錢加楊樹嫩頭五錢蔣左肝脾二傷濕鬱化熱擬中滿分消法但病勢極重不可輕視冬朮炒六錢川朴薑炒一錢腹皮炒三錢神麯炒一錢陳皮二錢玉金七分麥冬一錢五分澤瀉一錢乾薑四分川連三分官桂七分黃芩二錢燈心一團又原方加赤苓三錢倪左土衰濕聚外發瘍瘡內為腫脹擬建中分導白朮炒六錢茅朮炒一錢五分赤苓三錢陳皮一錢荊芥二錢穀芽三錢蘇梗一錢腹皮一錢銀花二錢苡米二錢車前三錢川朴四分蔣左風濕鬱於膚腠遍身浮腫宜先開泄肺氣桑皮防風苓皮陳皮荊芥薑皮腹皮加皮薛左酒濕傷中脾敗成臌醫藥難效冬朮腹皮川朴砂仁殼陳皮苓皮楊左腫從下起濁濕居多濕之所以為患者由土衰不能勝濕膀胱不能司化茯苓一兩肉桂三分小茴香一錢黑牽牛二錢車前子二錢通草一錢加緑色頭鴨腳一雙又腫勢漸減藥不外溫通膀胱培土勝濕原方加防己一錢潘左腹滿中空兩足腫脹便溏溲短脾土大傷症非輕視冬朮五錢腹皮炒三錢川朴一錢枳殼五分陳皮一錢五分苓皮四錢車前子炒三錢香附一錢滑石三錢香茹八分砂仁殼三分虞左中脘脹滿按之堅硬舌底紅而苔黃口渴脈至關獨見弦洪而大經云諸脹腹大皆屬於火又云下則脹已此其似乎川連四分檳榔一錢枳殼炒一錢瓜蔞仁三錢腹皮炒三錢焦楂三錢山梔六分黃芩八錢半夏二錢乾薑二分礞石滾痰丸三錢清晨服又投泄熱下降之劑而有應效仍宗前法佐以扶正川連陳皮枳殼神麯腹皮楂炭豬苓黃芩半夏乾薑川朴冬朮澤瀉知母赤苓炙草澤蘭小溫中丸四錢用洋參一錢冬朮二錢煎湯送下某六脈沉細如絲陽衰極矣火不生土土不生金金寒水冷臟無陰司化失職小水因而短少水無去路蓄於中而腹滿注於下而足腫泛於上而喘急除金匱腎氣丸其他皆非對症惜乎晚矣腎氣丸三錢人參五分煎湯送下過左大瘧初愈復受寒濕以致足腫便溏宜培土分利為主赤苓豬苓澤瀉茅朮神麯苡米陳皮麥芽楊左臟寒生病脘如抱甕議與助陽一法治之熟附一錢生薑二桂枝皮六分焦白朮二廣皮一錢苓皮炒二錢周左中虛發脹便溏而不為少寬身熱脈來細數症屬棘手藥難見效六神散去扁豆加神麯炒柴胡白芍山梔炒腹皮炒車前子某眼泡浮脹兩足亦脹胸腹滿悶此飲食飢飽失宜脾胃氣滯不運擬用胃苓湯主之川朴腹皮茅朮豬苓澤瀉陳皮炙草蘇梗薑皮苓皮萊蔔子邱左考之腹脹一門便泄而腹脹不減者重症也今痛泄月餘而腹日腫脹脈又見軟弱面帶青色此乃木侮土衰之象鳳黨八錢冬朮五錢連皮茯苓六錢神麯炒一錢廣皮一錢炙草一分蔔子一錢五分白芍三錢肉桂五分腹皮二錢川朴去皮五分車前子一錢宋左脾肺氣滯遍身浮腫時重時輕以疏理氣機兼培土能避風寒節飲食自然漸愈腹皮苓皮桑皮廣皮薑皮川通焦蒼朮焦麥芽殷左脈至弦數左關尺沉分有力睪丸陰莖微腫胸腹不寬去年曾患囊癰出膿乃濕熱閉結下焦而成今脈象見症如此濕熱乘虛注於中下二焦不生外瘍恐有腹脹之慮擬用淡滲分泄理氣法連翹廣皮蘇梗燈心廣木香管左兩足浮腫按之如泥面黃無神脈軟少力乃脾土衰弱寒水將有及中上之勢茅朮赤苓澤瀉香附焦曲穀芽殷童夾食夾風夾濕面目胸腹肢體無處不腫擬用胃苓合投苓皮川朴茅朮焦曲山楂防風薑皮燈心吳左脈來左弦右弱中虛腹瀉此土衰木侮之象茅朮土炒廣皮炒腹皮炒炒丹皮炒苓皮炒車前子炒薑皮宣木瓜焦麥芽麥柴一兩宋脾氣運行失職痰積交凝脘右肋下癥如拳大本當培土溫中緩圖自效而誤用攻伐以致徹散成臌諸症迭出而成棘手茲先培中土治之冬朮焦穀芽苓皮炒腹皮炒白芍炒大麥柴煎代水蔣左瘧後胸腹脹滿先從足起自下而上濕熱居多但汗出如雨舌無苔而光不獨土衰而衛外之陽守中之陰俱虛矣用藥宜乎和平為當苓皮廣皮鮮地骨皮鮮冬瓜皮炒苡米生熟砂仁生熟車前浮麥炒白芍炒張左風濕熱於肺胃遍身腫脹兩足尤甚色紅而熱擬與疏表理氣泄熱香茹防風荊芥桑皮苓皮廣皮腹皮薑皮楂炭澤瀉黃芩車前炒焦曲大麥柴代水又原方去黃芩桑皮加茅朮周右大小便不利胸腹四肢腫脹重症也開之泄之瓜蔞仁焦枳實杜蘇子杏仁葶藶子蔔子腹皮苓皮車前炒又通身腫脹退去八九納穀後胸腹攻撑脾氣未能健運兼以培土茅朮焦曲砂仁穀芽炒苓皮白朮炒車前子楊右腹大而軟脈來滯細面不浮足不腫此氣鬱成臌香附三錢苓皮四錢腹皮炒三錢陳香圓皮五分砂仁殼三錢舊鼓皮炙存性二錢又腹能少寬加味再進原方加細青皮一錢大麥柴五錢煎代又上不見咳面不見浮非風也足不見腫小溲通利非濕也腹大如箕按之外軟內實便溏日來兩次脈不遲亦不數亦非寒亦非火細細參之似屬氣鬱前投理氣初若有效既又不應改投培土行瘀再探之焦白朮楂炭紅花丹參丹皮香附焦曲車前子腹皮桃仁葫蘆巴以上分量均以三錢又投理氣行瘀俱不應效改投鎖補兼施黨參炒四錢萊蔔三錢焦曲二錢香附三錢腹皮三錢廣皮二錢木香四分沉香五分降香一錢又不喘不咳病不在表亦不在上腹不痛大便溏亦非實結開鬼門潔淨腑俱用不著脈不遲數口不渴不怯寒大熱大寒之品亦不合足不腫小水長分利去濕之品亦不合按之軟其為氣滯十有八九余方不過如此或欲速再請明眼酌治之原方加苓皮四錢繭殼三個此症起於産後年久不愈至小産後大投行瘀而愈張左濕熱蘊於中焦面目見黃胸腹為脹茵陳五苓散主之茵陳八錢生苡米三錢生茅朮三錢赤苓六錢豬苓一錢五分澤瀉一錢五分黑梔一錢腹皮三錢廣皮一錢五分黃柏八分某左土衰濕勝郁久防成中滿面色萎黃納食作脹兩足至晚浮腫或嘔或瀉都是脾胃兩傷之據茅朮炒焦白朮焦曲焦楂遠志茯苓澤瀉砂仁廣木香潘右腹滿中空兩足浮腫便溏溲短脾土已傷症非輕淺邵左風熱散走遍身作痛此外內兩兼先為分解洋參一錢荊芥一錢防風茯苓一錢甘草一錢枳殼一錢桔梗一錢柴胡八分川芎一錢銀花五錢前胡羌獨活各一錢牛蒡子二錢孔左六脈沉細食後中脘脹悶不適脾胃陽衰也炮薑一錢遠志五分益智仁八分焦白朮二錢黨參三錢製半夏二錢官桂三分五穀蟲一錢雞金一錢衄血鄒左脈大而數左甚於右鼻衄成碗而色鮮此炎暑熏蒸肝陽上逼肺金受灼而血妄行也麥冬一錢五分夏枯草一錢元參二錢丹皮一錢五分鮮生地四錢竹茹四分茅針花一錢京墨汁五匙廉右質本陰虧內熱鼻衄擬四陰煎肺腎同治北沙參三錢生地四錢山藥炒二錢扁豆二錢砂仁四分丹皮炒一錢川斛三錢焦穀芽二錢李左鼻衄脈至右寸關獨大此火浮於肺黃芩二錢白及一錢五分麥冬一錢竹茹炒五分錢童鼻衄已久宜清宜折豬苓二錢白及一錢五分茶葉子五分某左鼻衄頭痛風熱上行豬苓二錢白及一錢五分川芎一錢白芷八分秦右脈數內熱鼻衄此陰虛火浮生地四錢丹皮炒一錢元參一錢麥冬一錢北沙參三錢陳右血不歸經逆行於上而時見鼻衄脈至弦數甚於左寸關宜清養肝陰為先北沙參三錢麥冬一錢五分石斛二錢知母一錢牛膝一錢五分女貞子一錢五分地骨皮一錢又原方加大生地五錢去元參知母失音某左色脈無力而音不揚更兼咽喉不時而痛喜吃甘溫則適此係風寒束縛肺氣窒塞叭杏飯上蒸熱搗如膠另用肉桂末二錢以桂和勻搗將白蜜拌和勻如指面大每用薄綿一層包藥一粒含於口內將汁咽之日含二三次夜亦可含臥另用蜜陳皮二三泡湯代水又桔梗生熟草生熟訶子肉蟬蛻燈心香椿豆如無竹膜三分代之又雞子一枚置碗中打如糊白糖霜三錢上將滾豆腐漿一碗清晨沖服某寒束熱伏金實不鳴杏仁二錢桔梗一錢枳殼炒六分半夏一錢蟬衣七分蘇葉八分陳皮一錢薑一沈左六脈數大甚於兩關肝陽胃火熾甚上灼肺金為咳而聲音不揚大便難澀者肺與大腸相為表裡清金制陽必須育陰洋參麥冬川貝蟬衣生地蘆根鮮百合燕窩枇杷葉三味煎湯代水又火之旺者水必虧六脈數象不減方不外乎清金保肺壯水制陽洋參八錢麥冬三錢川貝四錢生地一兩丹皮一錢五分扁豆五錢通草一錢沙苑三錢甘蔗皮一兩枇杷葉三錢吳左氣弱音雌升麻三分柴胡三分黨參三錢冬朮炒三錢當歸二錢陳皮一錢黃耆三錢通草一錢半夏一錢杏仁一錢五分炙草四分訶子肉一錢香椿芽一錢蟬衣四
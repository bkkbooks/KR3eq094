錢竹茹八分吳左便血多年血多則汗多腸鳴谷減脈至左弦數肝腎之陰大虧脾胃之氣亦弱穭豆衣三錢山茶花一朵熟地一兩山藥一兩丹皮一錢萸肉二錢澤瀉一錢炒白芍二錢女貞子一錢五分當歸一錢五分陸左便血手足生瘡浸淫濕爛先以培土法祛風滲濕治之續商補劑可也防風一錢荊芥炒一錢苡仁八錢銀花三錢當歸炒三錢赤苓二錢茅朮一錢黃耆三錢紅棗一個桑枝三錢周左旬前便難見紅繼發蒸熱脊背更甚腰中大痛納穀不旺脈至右弱左弦此脾失統肝失藏擬木土並調黃耆六錢熟地炙八錢川斷二錢炙草炭五分潞黨三錢歸身二錢陳皮一錢杜仲三錢茯苓二錢地榆炭一錢烏梅一錢某血見便後所為遠血當兼肺治鮮石榴子五錢荷葉五錢苡米炒八錢當歸三錢五味十炙草六分生地五錢丹皮一錢黃芩一錢側柏葉三錢某便後見血脈至軟弱氣血兩虧當營衛兼補為主洋參三錢綿耆六錢冬朮三錢熟地八錢當歸二錢炙草三分荷葉炒三錢五倍子一錢汪耳聾面黑責在腎也指甲青暗責在肝也大便色如豬肝不思納穀土虛則水來侮之肝旺則脾受剋制脈至細數無情均屬三陰虧損理陰加疏泄制熟地八錢當歸炒二錢懷藥炒四錢炙草炭五分荊芥炭一錢生熟穀芽三錢獨活六分某便血不止茅朮炭一錢當歸炭二錢地榆炭一錢熟地炭六錢薑炭四分槐米炭二錢紅曲炭一錢炒苡米三錢荷葉蒂炒二個錢左素有便血去秋又見咳嗽發熱三月來熱不已咳不減亦脈弦數無神力乏神倦而畏寒陰陽俱虧脾肺兩傷乃下損及上之重險症也黑歸脾湯加薑炭元米麥冬五味白芍山藥去遠志木香丁右脈至細數便紅此血分有熱丹參炒三錢熟地四錢當歸二錢條苓五分扁豆炒二錢丹皮炒一錢川斛三錢穭皮炒二錢紅曲炒一錢竹茹炒五分馬右頭痛時作時止時常便紅脈至細弱此血虛所致宜養營陰熟地四錢川芎八分白芍一錢當歸一錢五分桑葉二砂仁三分王左便紅已久脾胃納穀不旺當培中土扁豆炒三分山藥炒三錢冬朮炒三錢炙熟地四錢穀芽炒三錢荷葉炒一錢侯左脈至重按無力右手微弱弦便溏見紅經年不愈經云血出於糞後者屬肝脾名遠血歸脾湯加棗仁地榆白芍杜仲棕炭荷葉炒蔣兩脅脹痛便時見紅肛門腫痛此屬肝脾失統失藏兼有濕熱先為清邪續投培固地榆炭二錢槐米炒一錢五分銀花三錢神麯炒一錢荊芥炒一錢五分桔梗一錢枳殼炒一錢炙草五分白芍炒一錢五分側柏葉二錢鮮艾二錢荷葉二錢毛左便血兩月陰分已虧而肛門重墜少腹作痛氣分不能調達桔梗一錢荊芥一錢枳殼一錢白芍炒一錢五分炙草五分當歸二錢中生地四錢防風一錢神麯炒一錢山藥三錢地榆一錢五分銀花三錢洋參三錢穀芽五錢荷葉炒一錢椿根白皮炙四錢陳左肛門重墜大便帶紅此氣虛下陷而不能攝血陷者舉之升麻三分柴胡三分黨參五錢當歸炒二錢炙熟地八錢冬朮二錢炙龜板四錢茯苓二錢五味三分烏梅炭一個宗左便血多年宜以攝固茅朮一錢當歸炒一錢熟地炭六錢五味炒四分炙草六分炮姜八分黨參炒三錢椿根白皮炒焦四錢張左勞力傷絡脾腎有虧便血如注茅朮炭一錢熟地炭五錢地榆炭一錢槐米炭一錢陳棕炭一錢側柏葉炭一錢張右便血月餘繼以腹脹便溏臍凸足腫脈至細弱而數此係肝體弱而用強脾土受克失運失健水反來侮使然險症也用擬三合湯法八珍湯加大腹皮一錢五分川樸七分廣木香五分香附二錢焦曲二錢苡米炒五錢車前子二錢杜赤豆一兩椒目一錢章大腸濕火不清時常便紅脈至右寸關尺數大亦屬實邪年輕體壯不妨直折條芩一錢槐米炒三錢桔梗五分地榆炒二錢銀花炒三錢丹皮炒一錢鮮地四錢穭豆衣三錢側柏葉一錢癃閉龔左小溲不利有因火閉有因濕濁有因於阻有因肺氣不能通調有陽衰不能司化有因升降失職有因腎不司開合今年過七旬脾肺之氣弱可知而脈見左尺似有若無乃腎陽衰而不司開合之徵法當滋其化源培其根本以補中益氣湯煎好送服金匱腎氣丸此立齋先生之法也黃耆六錢冬朮炒一錢陳皮一錢洋參五錢升麻三分柴胡三分當歸一錢五分炙草六分送金匱腎氣丸六錢堵右小溲不通一症有氣虛不達有腎真不司開合有濕熱阻閉有無陰則陽無化有陽衰則氣化無權有肺氣不能下行有胎氣下墜壓於膀胱今懷胎四五月自覺胎元下壓小便中有如火灼上見口渴似屬熱結癃閉肺氣不能通調宗此三門立方升麻四分洋參四錢黃柏炒一錢知母一錢麥冬四錢黑梔二錢車前子四錢水牛瀝尿毛一錢許左上竅不通則下竅不利嗽甚則小水痛而艱顯系表邪客肺氣機窒塞則膀胱不能輸化細蘇梗二錢烏藥一錢棗仁二錢通草一錢茯苓三錢澤瀉一錢五分滑石三錢桔梗一錢炒苡米四錢車前子二錢又蘇梗一錢烏藥一錢杏仁二錢茯苓六錢升麻八分肉桂六分黨參六錢周左膀胱不利為癃萆薢二錢海金沙二錢青蓮十粒條芩一錢黑梔一錢豬苓一錢五分澤瀉一錢赤苓三錢陳皮一錢通草一錢烏藥一錢某痛則不通且用通法懷牛膝六錢甘草三分鮮車前根四錢蟋蟀三隻麝香沖一分又柴胡三分當歸三錢洋參三錢澤瀉一錢五分陳皮一錢萹蓄三錢甘草四分車前子三錢華左癃閉有因於陽氣不化有因於濕熱癃閉有因於濁精阻竅有因於正氣衰弱今小水欲出不出少腹脹痛脈至數大有力似屬濕熱居多且宗輕可去實一法黑梔一錢通草二錢赤苓五錢澤瀉二錢甘草五分滑石三分菖蒲四分鮮扁豆一兩菊花根鬚五錢宗左舌黃脈軟小水不利此中二焦濕熱所蘊川通草一錢赤苓三兩半夏一錢六一散三錢黑梔三分接方服生冬朮三兩杜仲三錢赤苓三兩山藥炒三兩苦參一錢豬肚一具磨末為丸清晨開水送服四五錢陳右癃閉而至嘔惡出汗氣逆不能下臥已泛及中上二焦棘手極矣而脈至細弱右尺如無口思飲冷胸腹脹悶偏寒偏熱不敢輕投偏補偏攻亦末便擅用勉商滑利宣通氣分一法北沙參三錢麥冬三錢通草一錢赤苓三錢滑石三錢冬葵子三錢蘇梗磨沖一錢王不留行三錢陳粟梗二錢鮮車前草須五錢鮮荷梗三隻水牛瀝尿毛十根鮮菊花根鬚五錢又小便雖能稍通而大便閉結四五日未更衣今肛門下墜腫脹不收腹內攻撐失氣泄水穢濁而熱渴思冷飲脈至交昨略為流利右尺依然若無惟右寸關稍為滑數蓋肺與大腸相為表裡以見症而論究屬火閉經曰有從症不從脈之例此其近似然峻攻之藥亦不敢輕易擅投先用更衣丸以通火腑再商無陰則陽無以化之法以清膀胱愚見如斯未識當否黃柏一錢知母一錢桔梗一錢川貝八錢麥冬三錢黑梔一錢滑石三錢茯苓三錢通草一錢枳實八分澤瀉一錢五分蔞仁三錢元明粉三錢紫菀茸三錢老蘇梗四錢鮮車前草根鬚五錢鮮菊花根鬚三錢鮮萹蓄三兩又昨投更衣丸後連得大便始而乾結繼下溏薄稀水胸腹已寬小溲已通今脈象左三部流利右尺仍若有若無據述脈象向來如是可以不必為慮惟右尺緩大未平此余焰還未清楚方宜輕靈清泄北沙參三錢麥冬三錢茯苓四錢通草一錢黑梔一錢蘇梗一錢荷梗一尺鮮車前草根鬚三錢鮮菊花根鬚三錢燈心五寸又二便通利脈亦和平今神情懶倦者病後之景象也能調理小心自然日愈一日洋參一錢五分茯神一錢五分生熟砂仁六分香附一錢通草一錢麥冬三錢丹參三錢穀芽生炒二錢山梔八分車前子炒一錢荷梗五寸燈心五寸某右濕熱壅閉小溲為之艱澀赤苓三錢川通草一錢車前子三錢滑石三錢澤瀉一錢五分豬苓一錢五分黑梔一錢蘇梗三錢廣皮二錢瞿麥三錢燈心五寸二便陳左二便不禁乃腎氣不固二便不爽由腎氣不充但由來已久急切不易圖痊前方獲效宗此改作丸劑熟地八兩萸肉四兩丹皮三兩山藥四兩澤瀉四兩茯苓一兩洋參三兩牛膝三兩車前子三兩沉香八錢韭菜三兩白果肉二兩上藥用豬脊髓二十條飯上蒸和藥為丸每日清晨服四五錢某左腎司二便不爽乃神氣不充熟地一兩萸肉二兩丹皮一錢山藥三錢茯苓二錢澤瀉一錢五分洋參一錢五分車前子一錢五分韭菜二錢章左氣弱則膀胱司化無權腎虛則二便開合無主洋參三錢熟地六錢當歸三錢茯苓二錢車前二錢通草三分澤瀉一錢穀芽生炒二錢陸左濕熱下注二便閉結通之通草二錢車前一錢鮮萹蓄五錢滑石三錢瞿麥三錢梔子一錢大黃二錢草梢五分荷梗一尺燈心一團宗左陽衰陰涸谷阻便結脈遲細而微擬添薪續陽溉水助潤法黨參炒四錢熟地八錢熟附八分製半夏一錢五分炮姜五分蔻仁五分某腎司二便小水數而不禁雖由傷陽起見未必非腎氣無權熟地六錢杜仲五錢益智仁五分骨碎補一錢五分黨參三錢紅豆三錢

因則有二焉非外感則內傷然則為勞損其至則一也閱先生之治症土虛者以四君腎虛者以六味肺虛者以生脈氣血虧者以養營肺胃兩虛者以固本木火刑金者清金以平木土不生金者培土以生金心陽亢逆者益心以養金金不生水者補氣以生精水不藏納者補精以化氣當認其原委隨其機勢而治之觀者勿謂其法不詳而忽之也上下血徐左先吐血又便血今雖血止咳嗽不已肛旁患瘍成漏上下交損能勿勞節欲服藥則效否則無功治下以六味丸清晨服四五錢淡鹽湯送治上以補中益氣湯晚間服此立齋法升麻三分柴胡醋炒三分黨參三錢炙草五分冬朮三錢陳皮一錢五分黃耆六錢當歸三錢槐角三錢麥冬一錢五分五味十粒血餘一錢銀花炒二錢百合二錢苡米四錢張左血不歸經上溢下出今雖止須要小心六味湯加麥冬一錢女貞子一錢旱蓮草一錢側柏葉一錢五分車前草根二錢張左夏秋失血之後體氣未能復原今又見紅脈至左關尺細弱頻見夢遺此肝腎之陰虧也右關見浮大時而牙齦腫脹便堅帶紅此屬肺胃有火擬用四陰煎以清上實下生熟地八錢麥冬一錢五分川槲三錢甘草三分沙參三錢茯苓一錢知母炒五錢穭豆衣三錢元參一錢丹皮一錢扁豆二錢參三七一錢加百合三錢川貝一錢五分側柏葉一錢陳左咳血便血因傷而致今便血已愈咳嗽未止凡有傷起見久而血不止者必有停瘀非比情志之血只要培補用擬行中帶補法白及二錢金毛脊四錢續斷二錢杜仲四錢骨碎補四錢荊芥炭一錢杏仁一錢五分桃仁泥一錢五分紅花四分藕節一個陳棕炙一錢五劑後去桃仁杏仁紅花加桃肉二個苡米炒三錢孫左陽絡陰絡兩傷血溢於上為嘔吐溢於下為便血脈至右寸關軟弱左關尺細數當氣血兼調洋參一錢黃耆六錢當歸二錢生地一兩丹皮一錢五分荊芥炭一錢女貞子一錢五分白芍炒一錢山藥三錢陳皮一錢三七一錢旱蓮草一錢五分加竹茹一錢藕節三個又肺腎兩傷喘急不能下臥更兼脈數無情此血後所大忌症屬重險用擬貞元以納腎氣生脈以固肺氣早晚進之有效可以許痊洋參三錢黃耆六錢沙參三錢川貝一錢麥冬二錢五味五分又當歸一錢五分炙草五分浮麥炒二錢牛膝炒一錢五分生地一兩邊左便血於前咳血於後繼見成盆而沖當清肺腎黃芩二錢生地一兩荊芥炒一錢三七一錢竹茹一錢藕節二個張左體質虛寒喜吃辛辣則適未免太過久而增氣胃有積熱以致失血便紅屢發屢止多年不愈今面色痿黃脈至右三部細弱無力而帶數右關獨見數大血固虧矣第陽明之積熱不清燥溫辛烈之品在所當禁即如參耆歸術雖屬血症收功之藥而於氣分有火者未免有助陽之弊至苦寒之藥又非久病陰虧所宜商以育陰制陽甘寒治大熱一法庶無虛虛實實之慮六味丸去山萸加鮮石斛白芍淡芩竹茹蘆根綠豆又因積熱而動血去血過多則陰虧陰虧則火旺自投育陰制陽甘寒治大熱一法血已止而脈右關較前略小惟數不減此即陰虧火旺之據至於便溏晨泄吐酸亦有因郁不泄而致者然久病之軀全藉後天能納能運目下立方只要育陰配陽亦血症善治之一法六味丸加炒白芍一錢北沙參三錢石斛三錢穭豆衣二錢銀花炒二錢川貝二錢廣皮一錢竹茹炒八分生穀芽二錢許童嘔血於上便血於下面色無神脈來虛軟微微發熱納穀不多雖有宿傷而血已去脈色兩虧宗先賢血症以胃藥收功切忌見血用涼再伐其生生之氣黨參三錢冬朮二錢茯苓一錢五分炙草四分當歸二錢參七沖一錢陳棕一錢又脾胃稍起血後宜養至於誦讀最易耗氣動火火動血溢難免不發復且靜養百天氣血充足用功未遲否則非第無益而有害炒黨參三錢炒冬朮三錢炒扁豆三錢炒當歸二錢金毛脊二錢穀芽炒一錢五分廣皮五分陳棕炙一錢竹茹四分藕節一個又脾胃日醒血亦止矣從此小心調養可以漸漸復原黨參四兩冬朮三兩扁豆三兩雲苓三兩炙草一兩熟地四兩當歸二兩丹皮二兩麥冬二兩川斷一兩五錢廣皮一兩楂肉二兩上藥共為細末棗肉為丸每服三四錢章左病有因虛致痛者其病在本有因病致虛者其病在標此病因辛辣太過胃家增氣積熱邪火徹上徹下血或見口或見便反覺適意乃積熱為患無疑此屬因病之虛前方非不應效加減還可再投生地一兩丹皮二錢茯苓二錢澤瀉一錢五分沙參五錢廣皮一錢五分銀花三錢穀芽二錢竹茹一錢蘆根一兩綠豆五錢懷藥三錢劉嘔血於上便血於下多至成碗盈盆今發熱不退脈至浮弦數大右關與尺更甚舌苔滿黑症屬肌軀過勞受風受熱所謂內傷而兼外感論症論脈忌疑不一險重症也兩三日內脈靜身涼或有可望之機否則難挽生地一兩荊芥炭二錢參七沖一錢竹茹一錢鉤鉤三錢又方生洋參五錢炒丹皮一錢五分元參一錢晚服又脈至數大減去四五身熱亦去二三血幸而止但舌黑如昨邪熱猶戀於營分未可恃以無恐生地二兩荊芥炭一錢生洋參五錢丹皮炒二錢連翹一錢五分麥冬一錢五分銀花三錢車前炒一錢竹茹一錢竹心一錢蘆根一兩燈心一丈又左手脈象已見和平惟右手未能全退舌黑亦能稍減前方略為增減再投但人事須極宜小心自得漸漸生機來復原方加炒扁豆三錢竹葉五分減丹皮一錢連翹一錢章左脈至兩關弦數左細弱吞酸傷酸無非肝脾二經之火便血吐血乃是陰陽兩絡俱傷且清肝胃之火續商填補可也竹茹炒一錢鮮車前根鬚二錢川連三分荷蒂炒二枚藕節二個廣皮八分扁豆炒二錢荊芥炭一錢又接服生地一兩真懷藥炒八錢丹皮炒一錢廣皮炒八分荊芥炭一錢竹茹一錢地榆炭一錢側柏葉炒一錢糯稻根鬚三錢如此方服之平穩可加炙熟地五錢砂仁一錢活水蘆根四
body:
  text: 卷二非風汪右曲運操勞心脾受損土衰木旺火動風生有形之痰挾無形風火入肝之絡蒙閉心胞手足不用言語不出眼閉口開痰聲漉漉脈至軟弱二便通利症非中風即景岳謂非風第傷絡者易愈傷腑者效遲傷臟者危險今脈症合參病傷於臟恐吉少凶多議熄風湯兼培氣血佐以豁痰備質高明鉤鉤一兩石決明一具甘菊二錢遠志七分橘紅一錢膽星一錢半夏曲一錢杞子三錢生炙草六分人參一錢辰砂冬一錢竹油半懷薑汁二匕石菖蒲二錢金器一具強右平素操勞前年血敗之後失於調養三四日前晨起卒然而僕即左手足不用呵吹頻頻脈見弦滑舌苔色正而膩以脈症合參乃肝血有虧內風頻發兼之勞倦傷脾土衰則濕痰凝聚肝木乘虛來侮此景岳所謂非風當培養肝脾氣血兼以利濕豁痰至於驅風之藥無不傷表損氣非虛症所宜況外無三陽表症內無便溺阻隔切莫以中風實症門中方法治之當歸四錢杞子三錢杜仲三錢鉤尖五錢石決明一具半夏二錢橘紅一錢焦茅朮一錢桑枝五錢非風症即古所謂中風症也景岳恐後人誤認外風故易去中風二字而擬名類風厲風仍與風字相近疑是不解竟以非風名之又謂之類中類中者似屬風之中人而其實非也究其以然者緣乎七情內傷或因酒色過度或因勞動太過或系年高衰頹蓋先傷五臟之真陰繼而陰傷及陽身中真陽無以制伏內風鴟張陡然掀旋鼓舞是以有卒然仆倒舌短神昏語言不出遺尿失禁鼻煸口開手撒汗多口眼歪斜耳聾直視四肢癱瘓偏痿反張症答總之皆系氣血之虧臟腑之衰可知也舌短神昏者心臟氣絕也語言不出者痰阻於絡也鼻煽者肺臟氣絕也口開者脾胃氣絕也手足反張口眼歪斜者肝臟氣絕也耳聾直視者腎與膀胱氣絕也四肢軟癱者肝脾之氣絕也偏痿者氣血偏枯也即半身不遂之症也汗滑如油者衛氣脫也此乃中臟之極重險者也至於類中輕重症或由內風兼召外風或由外風而引動內風或不由外風而中絡中腑宜參諸中門中預為之備而早治之庶免於履冰臨淵之患內經所謂不治已病而治未病者其為上工也哉肝風宋左頭目苦眩耳為重聽步履不能輕便皆因氣不充幸脈象不弦不硬耐心調養自然見功杜仲四錢杞子三錢萸肉二錢熟地八錢天麻一錢懷牛膝二錢洋參二錢遠志六分冬朮三錢首烏三錢砂仁四分煅磁石四錢宋左氣鬱不舒肝陽上亢犯及心胞睡臥不寧而怔忡如躍上及兩目時而頰赤右眼神色淡為偏傷致視物不明其失於早治今左眼又見模糊急急養營為主兼以解鬱扶正柴胡三分白芍炒一錢當歸三錢茯苓一錢五分白朮炒一錢五分玉金七分石決明四錢洋參一錢五分生地三錢丹皮四分穭豆衣一錢棗仁二錢香附六分遠志四分黑梔三分桑葉二片夏枯草八分甘菊一錢楊右諸風掉眩皆屬肝木四肢屬脾少腹屬肝時而痰時而疼風淫未疾也養血去風為主培土抑木為佐川芎八分當歸三錢白芍一錢五分熟地六錢天麻一錢杜仲四錢杞子三錢洋參二錢石決明五錢茯苓二錢冬朮三錢炙草六分川斷二錢木瓜一錢懷膝三錢虎脛骨四錢加桑枝五錢松毛一錢香附一錢史右苦溫養血祛風水不涵木風陽上熾當歸二錢白芍一錢熟地五錢棗仁三錢茯苓神二錢天麻一錢洋參五錢半夏一錢五分制首烏四錢陳皮一錢山藥三錢杞子三錢杜仲三錢冬桑葉一錢砂仁四分右內風兼召外風良由血虛所致川芎一錢當歸二錢熟地五錢白芍一錢天麻一錢杞子三錢制首烏四錢桑葉一錢半夏一錢五分陳皮一錢史右脾氣不充肝血不足內風掀動兼召外風八珍湯加半夏天麻桑葉秦艽白芷鬼箭羽雍正錢王右心陽妄動良由肝木旺而風不息洋參一錢五分丹參三錢元參一錢五分茯神二錢棗仁四錢白芍一錢生地六錢麥冬一錢石決明五錢紫石英三錢當歸一錢淮麥百粒某諸風眩掉厥陰轉筋無非肝木乘脾歸鬚三錢全蟲尾兩條防風一錢五分蒼朮一錢黃柏一錢秦艽二錢苡米一兩川膝三錢木瓜三錢檳榔二錢鉤鉤一兩紅花四分華左脈至左弦右弱厥陽上熾為眩犯及脾胃為納少大便不固法當培土抑木冬朮二錢懷藥三錢白芍炒一錢五分砂仁八分陳皮一錢炙草二分穀芽二錢建蓮四錢四五劑後加黨參三錢安右肝為剛臟體陰用陽風從火擾為眩為暈逆犯於胃為口喝為酸理宜清金以平之壯水以涵之則剛動之質遂其條和之性陽不亢而風熄也但情志之恙非比外感六淫可以急效必須緩緩圖治北沙參三錢白芍一錢川石斛三錢麥冬一錢甘菊一錢牡蠣生四錢川貝一錢茯神二錢橘紅八分生地四錢穀芽二錢秫米三錢烏梅半個竹茹八分吳右百脈牽引時時上下流行痛無定在甚至不能轉側丹溪云上升之氣多屬於肝又曰自覺冷者非真冷也氣從厥陰而來亦自覺冷氣有餘即是火甚則風生風動則痰生六淫之中惟風火之性遊行無定惟氣聚散無定脈見弦滑而大似氣火有餘與見症合參是肝火入絡鮮橘葉二錢絲瓜筋絡二錢青桑枝二錢銀花三錢青松毛二錢鉤尖一兩杉木梢一兩柏子仁一錢南沙參三錢川貝一錢黑山梔一錢歸鬚一錢沈左木失水涵風陽上浮此宜上病治下壯水涵木也六味加甘菊一錢五分麥冬一錢五分元參一錢五分石斛三錢龔左下虛者上必眩宜壯水潛陽即補陰以制陽也熟地八錢萸肉二錢山藥四錢天麻一錢洋參一錢甘菊一錢石決明三錢鉤鉤四錢陳右經來血多肝無所養內風掀動手足為之牽引振掉有時麻木血傷而氣亦傷治當營衛兼調佐以熄風通絡經云氣虛則麻血虛則木麻木則氣血兩虛當歸酒炒六錢黃耆炒三錢鉤鉤五錢石決明五錢杞子二錢杜仲三錢木瓜一錢桑枝尖三錢茯苓中木一錢青松毛順治錢四個童左風陽上熾頭目苦眩宜泄風陽甘菊炒一錢當歸三錢桑枝一錢天麻一錢半夏一錢五分鉤鉤五錢制首烏炒四錢石決明六錢項左脈至弦滑風陽上擾挾痰頭為苦眩北沙參三錢鉤鉤五錢製半夏一錢五分甘菊炒一錢石決明八錢杞子炒一錢五分制首烏四錢青桑葉一張接方洋參一錢五分生地八錢當歸一錢五分白芍炒一錢甘菊一錢半夏炒一錢五分決明生打八錢廣皮鹽水炒八分桑葉一片殷左脈至浮數而空兩足無力得解後起立則眩經云下虛則上盛當熾風涵木壯水制陽六味地黃丸加天麻當歸白芍川石斛孫右肝風走絡心神不安寤不成寐筋惕肉瞤法當靜以制陽鮮百合一兩鮮首烏藤三錢麥冬一錢黑山梔八錢紅帽幃五分知母一錢雞子白衣五個加燈心辰砂拌五寸汪左風陽旋擾頭目眩暈肩背痠痛調和氣血之中加以熄風平木此乃走絡之徵兆也大黃耆蜜炙六錢當歸三錢制首烏四錢天麻一錢冬桑葉一錢海桐皮一錢桑枝三錢紅棗三個章右八脈虧任脈尤損囟門不合按之虛軟內風掀動頭目苦眩當宗奇督治鹿角膠二錢鹿角霜三錢虎脛骨三錢當歸二錢熟地五錢杞子三錢制首烏四錢黨參三錢天麻一錢白果肉五粒周右六脈虛細搐搦頻發良由血不營筋經曰風淫末疾此宜是也甘杞子三錢當歸三錢洋參一錢白薇一錢炙草六分鉤尖四錢加桑枝四錢杜仲三錢甜冬朮三錢馬右脈至左弦中陽上升頭目因之眩暈法當壯水制陽熄風平木熟地八錢白芍一錢五分當歸三錢決明五錢鉤鉤一錢天麻一錢炙草六分杞子三錢桑葉二片肝風者肝陽動而風不寧也內經曰肝屬剛臟有相火內寄體陰用陽喜柔惡燥為將軍之官而為春生之長其味酸其類木其屬風其應春又云東方生風風生木木生酸酸生筋筋生心肝主木病名肝風者非六淫外來之風乃因臟陰虧損木少滋榮風陽旋擾是內風動搖不可誤認外感者也蓋肝性急全賴腎水以涵之肺金以平之中土以培之血液以濡之一有所失則剛動之質失其柔和之體無以制伏風陽繞動不息所謂大風卒來莫御矣其致病之由有四一由腎水不足木失水涵而肝邪獨旺內風沸起致有搐搦痰厥頭目苦眩驚癇痰鳴多淚喉痹等症一由肺氣之虧失其清肅下降之令金不制木木反侮金肝陽上逆金愈虛而木愈橫致有咳逆痰多喉痹舌碎口渴喜飲鼻痔鼻衄諸症一由思癔煩勞身心過動失其暢茂條達之性致有風陽瘛痙癲狂癡呆易怒忘誕逾垣上屋撕去衣被或木火遊行為足腫面赤囊腫成癰魚口便毒齒痛腐腫之症一由風木過動必犯中土脾臟受戕致有噯酸腹脹嘈雜易飢土敗便泄吐嘔諸症種種見端無非營液枯槁肝陰不足內風掀動耳然根萌準據如此因於時邪觸發者亦有之先生治法者氣血兩虧者補之以八珍營虛木鬱者養營以疏肝肝脾兩虛者扶土以養肝肝腎兩虧者壯水以濡木血虛風動者養血以泄風風木煽動心陽者養血祛風而佐靜以寧心培土以抑木木火遊行入絡者祛風以宣絡水不涵木者補母以生子下虛上實者補陰以制陽木火上逆者以泄其風陽奇虛風動者峻補其八脈總之不外乎四者物多若有兼見則隨症施治庶不失先生源流也哉虛證李左虛損而至音啞咽痛怯冷便溏面色青中帶白不特肺腎陰虧脾肝之氣亦有衰極矣清涼發散固非所宜即純陰滋潤之品於陰虧者非不合若兼脾氣不運而見便溏者亦宜慎用勉商保元生脈加減以取培植中土即是生金水之議茅症非輕渺諸凡自知調攝人參一錢炙草五分山藥炒五兩五味三分黃耆三錢炒芡實五錢復診下損及上音雌咽痛大便見溏脾肺腎三臟俱虧脈至細數而數弦按之無力法不外乎培補脾肺氣分滋填腎陰須自保養為囑原方加雞子白皮三個竹膜三分燕窩三錢香百合三錢青果一個元米一撮李龍雷上升沖及於胸心為震盪犯及巔頂汗出淋漓法當溫納導火歸原納氣歸腎之意熟地一兩丹皮三錢萸肉四錢懷藥炒四錢茯苓三錢澤瀉三錢懷膝三錢車前子三錢當歸三錢棗仁三錢沉香六分肉桂五分熟附子一錢小茴三錢五味一錢白芍三錢砂仁炒一錢復診氣自少腹上衝當鎮肝攝腎熟地一兩川楝子鹽水炒一錢五分茯苓三錢當歸二錢肉桂三分白芍炒一錢五分砂仁炒八分南沙參三錢五味七粒蔣左質本陰虧陰虧者陽旺素有便血易犯喉症時常內熱皆確據也擬用育陰制陽耐心久服北沙參三錢洋參三錢麥冬一錢川石斛二錢懷藥五錢陳皮一錢生首烏四錢生熟草二分楊左舌無苔而有裂紋操心過度四肢無力而納穀減勞倦傷脾也內熱肺虛須當氣血兼培然燥裂宜忌洋參一錢五分熟地五錢杞子二錢丹參二錢懷藥四錢炙草二分棗仁二錢紅棗二個徐右左顴色赤下午尤甚脈至左關獨見弦數腹脅攻撐無定兩腋結塊大小不一脈症合參無非肝陰虧陽旺火燥痰凝氣機執滯法當壯水之主以制陽光以涵肝木兼疏肝之用以理氣豁痰炙生地八錢白芍炒一錢五分丹皮一錢五分山藥炒三錢澤瀉二錢川貝三錢香附二錢元參鹽水炒二錢銀胡八分石決明四錢茯苓二錢許右汗多而身熱不退脈至細數無根咳嗽納少便溏損怯重症也黨參五錢熟地八錢冬朮六錢山藥一兩白朮三錢神麯一錢炙草五分五味一錢地骨皮二錢青蒿一錢牡蠣五錢沙參三錢生熟穀芽七錢陸左脈數舌赤無苔不常發熱脘悶不舒此營陰虧損而肝陽橫逆當歸二錢丹皮三錢洋參一錢五分川貝二錢川連吳萸炒二分加石菖蒲三分生薑一片史右肝腎兩虧氣不潛藏當歸二錢白芍炒一錢五分熟地四錢杞子三錢砂仁八分元胡一錢木瓜一錢五分川楝子四錢刺蒺藜二錢孫右損症而至上下交損難為力矣熟地六錢萸肉炒二錢懷藥
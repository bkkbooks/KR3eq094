脈症合參議與五福飲氣血兼培黨參砂仁拌炒三錢冬朮去心二錢當歸炒二錢熟地四錢炙草四分加姜棗封左動作煩勞即見內熱而食減當滋養腎脈之陰培補脾肺之氣洋參一錢五分冬朮二錢炙草五分當歸一錢五分熟地炙四錢川斛二錢生熟穀芽二錢加姜一棗三高右帶下頻頻時時內熱六脈軟弱氣血兩虧用擬八珍以補營衛八珍湯加焦神麯厚杜仲焦穀芽薑棗顏左病經二十日神識昏迷舌乾無津脈至軟弱且細且空氣血俱虧傷極矣邪難外達勢必轉趨於內所謂陷也邪不在表斷無散理大便已通斷無攻下之理況脈弱如此不慮其虛乎昔賢治無實症可據即是虛症今但見虛象舍托透一法別無良策信則可投有疑有怨切勿輕服黃耆六錢當歸一錢五分生地遠志六分棗仁一錢大冬一錢洋參一錢柴胡三分熟地一兩竹葉十片鉤鉤四錢大豆卷四錢甘蔗汁十匕沈右麻為氣虛上耆六錢當歸酒炒一錢五分黨參炒三錢茯苓神一錢冬朮三錢炙草三錢桑枝酒炒三錢侯左氣虛麻木上綿耆六兩陳左脈至左關尺弦大而洪內熱咳嗽責在肝腎陰虧六味地黃湯加大冬金左六脈沉細發熱食減精神倦怠大便溏薄乃勞力受寒夫虛症也以脈而論症屬極重黨參六錢廣皮一錢生熟穀芽四錢姜一生熟砂仁六分何左自投補中益氣法右脈稍為有神胃口亦醒今左三部不但無力而兼細澀細為血少澀主精虛急宜加重肝腎填補之藥體實脈實者截瘧之藥未嘗不可投體虛脈虛者雖截瘧亦不效況截瘧之藥非斂即攻無不傷正正氣一傷非但不能輕減往往有因此重者不可不慮也欲托透兼施者莫善補中益氣加減氣血兩虛而偏於寒者莫外乎十全大補加減昔賢醫案有服至數十劑而愈者有至百餘劑而效者是非藥之不靈而不應凡氣體之虛或操心過度以傷神氣或酒色過度以傷真陰其由日漸月深而來受邪致病最不易退必候元氣充足不求愈而自愈矣今以脈症合參精氣神三者俱虛亦不可不兼固然耐心切勿欲速並宜守養不可忽略黨參炒六錢冬朮去心八錢當歸炒三錢半夏制一錢柴胡四分炙草五分蔻仁一錢穀芽一兩廣皮一錢首烏六錢熟地砂仁拌炒一兩綿耆一兩蘇葉五分棗二姜二賈左六脈軟弱右三部更甚面無華色形體消瘦乃氣血兩虧之質向因胃有溫痰多食姜通陽絡受燥而血溢從此即貪涼畏熱多服麥冬陰經著寒而瘧起熱如姜寒如大冬尤不能勝其任其臟腑之薄弱可知如必欲攻截破散吾恐益末受而害先至矣據恙見新方休瘧飲乃氣血兼調庶無偏勝之累黨參三錢首烏五錢炙草四分冬朮炒三錢當歸三錢玉竹三錢生熟穀芽四錢廣皮一錢柴胡三分蔻仁二粒丁陰陽兩傷氣血俱敗雖有參耆亦難有效而欲以苦寒退之破氣寬中其可得乎焦麥芽三錢扁豆子三錢茯苓二錢香稻葉二錢吳熱自晚來清晨無汗而退唇紅溲熱顯屬陰虧而陽陷於下某產後失調恐成損症熟地炙炭五錢地骨皮一錢懷藥炒三錢川貝二錢沙參四錢砂仁炒六分茯苓二錢廣皮一錢竹茹六分炒浮麥三錢某左日暮微微內熱似當育陰但胸口痞悶脈見軟弱先理中宮續商扶正養陰可也焦冬朮三錢砂仁六分製半夏一錢廣皮一錢六神麯八分洋參一錢五分姜一旋覆花一錢大麥冬五錢焦枳殼三分某右始由悒鬱繼又產後失調肝脾兩傷咳逆發熱胸悶便溏虛損成矣藥不見效懷藥二錢焦神麯一錢廣皮一錢川鬱金七分砂仁炒八分香附一錢五分丹參三錢木香三分桔梗六分降香五分某左勞倦傷脾焦白朮三錢川斷三錢當歸三錢懷膝二錢杜仲四錢冬花三錢骨碎補一兩虛症之由其因不一五臟之損病各不同六腑之虧多由乎臟奇經之意亦由乎臟也或緣先天稟薄或因後天不固或系內勞其神或因虛致病然所視之殊難以縷析考之越人上損從陽下損從陰之論上損者因於操持勞神心脾偏多下損者系乎房欲傷精肝腎為多心脾損則神色敗仲景有建中湯立中氣而復其真元之不足肝腎傷則形體壞景岳有左右歸飲填補下焦而培其精髓之空隙金匱有脈大為勞為氣分泄越脈虛亦為勞為精血內奪亦即越人上損下損之義大抵上損者補之以氣下損者補之以味氣因精而損者補精以化氣精因氣而損者補氣以生精所謂治病必求其本也總之不越乎陰陽者也蓋陽化氣陰成形陽虛則陰無以生陰虛則陽無以化所以精賴氣化而成氣藉精化而生故陰陽不得相離氣精不得相失也經曰陰在內陽之守也陽在外陰之使也又云陽勝則陰病陰勝則陽病陽勝者非陽之勝也實由陰之不足宜補陽以配陰不治陰而陰自化故陰陽不得相失也參先生之治道氣血虧者補之以甘溫津液虛者培之以甘寒陰虛陽亢者酸甘以化陰陽虛陰勝者辛甘以理陽種種之治法皆不出乎前賢經旨先生之精義後學之津梁也怔忡章左思慮太過心神不安時而震動譬之魚失水即躍心無血養焉得寧靜此即怔忡驚悸之漸也桂圓制洋參三錢棗仁炒八錢茯神辰砂拌三錢丹參二錢柏子仁去油一錢紫石英三錢紅棗五個淮小麥一撮豬心一個煮爛一碗去油煎藥強右心生血肝藏血心少血養則怔忡肝血不足則視物不明至於飲食減少大小便不爽無非虛象柏子仁六分棗仁二錢茯神一錢懷藥炒五錢當歸一錢五分杞子二錢遠志五分熟地四錢石決明四錢紫石英二錢黑脂麻二錢桑葉一片紅棗三枚怔忡之症心跳振動驚恐怵惕者是也緣乎營陰不足心陽不藏神不守舍以致心神不寧而怔忡不安漸至心悸不寐之所由來也然怔忡心悸其病雖異而其源實由乎一也或因思慮鬱結者逍遙飲與益營湯喜樂太過者養心湯或寧志丸驚恐神怯者寧志膏或達志丸志戀傷神者硃砂安神丸痰火雜者溫膽湯或硃砂消痰飲痰飲侵心者七福飲或二陳湯木火凌心者龍薈丸腎陰不交者左歸飲肺失清肅者生脈散病後營虧者盡釋病根六淫外來者隨症施治總之無非營血之耗而心不藏神者也蓋心為一身之君主凡七情六慾無不由於心五臟六腑無不繫於心一有所傷則寧靜之質反為暴烈之性怔忡心悸由此而起矣景岳血症論曰心生血肝藏血脾統血夫心為生血之臟最不可傷也心有所傷非惟君主不寧而臟腑皆受其累譬之桀紂暴瘧而民無安日矣全賴湯放武伐而天下治上下逸樂皆受爾福怔忡心悸之病亦猶是也癲狂查左風火挾痰為癇厥羚羊片八分鉤尖六錢石決明一具天麻一錢橘紅一錢陳膽星六錢生地四錢甘菊一錢金器一件同煎吳左六脈洪數搏大按之有力純乎痰火瀰漫以致神識模糊膽星一錢半夏二錢瓜蔞仁三錢橘紅一錢五分黃芩一錢玉樞丹磨沖一錢陸左肝風痰火熾甚語言不論脈至左關弦滑防逾垣上屋不避親疏羚羊角一錢鉤藤一兩石決明一具半夏二錢膽星二錢廣金一錢茯神二錢廣紅一錢五分生熟棗仁六錢黑梔一錢乳香六分竹油半杯石菖蒲三分鐵屑一兩脈滑而大不數不洪痰則有之並無火據經云重陰者則癲此其是也但痰甚如此必欲從溫補治亦非善策太乙紫金加犀黃名大還丹專治一切痰症之變怪多端者今且試服四五朝再商別治太乙紫金丹一錢犀黃一分另用生礬少許泡湯磨化沖竹油連薑汁各十匙上服十劑而吐出清水繼以稠痰又前用大還丹吐去痰涎約有數杯而脈未能全退然補藥治病可退攻利治病不可過先賢云衰其大半而止此亦謹慎之道不可不宗製半夏一錢五分茯苓一錢橘紅一錢枳實八分膽星一錢石決明一具茯神二錢黃芩一錢竹油半杯竹茹一錢邵左酒之為物酷飲者大則可以喪國小則可以亡身怯弱者可以使強旺強旺者可以更暴戾或飲之而可以消憂可以免悲哀並於陽則狂而妄並於陰則癲而呆總之隨人之氣強弱入於何臟何經變出之病豈止一哉如仍然多飲不能即戒雖服藥無益葛花三錢雞鉅子五錢遠志七分半夏一錢竹黃一錢綠豆一兩又此症陽狂可以速愈況酒不戒而欲疾廖豈不難乎原方加黨參炒四錢炒神麯一錢石菖蒲三分再診加茅朮一錢過左脈至左關沉弦右關洪滑沉弦為氣鬱於肝而木旺洪滑為痰火居胃而發狂但本虛標實純用攻痰直折恐邪遏正氣難支每多不測之變驟加補益氣之劑未免助火愈增其焰商用加味逍遙合六味一以疏肝一以壯水制陽庶乎無偏勝之害柴胡三分白芍六分丹皮二錢黑梔一錢五分生地一兩茯苓三錢澤瀉一錢五分懷藥三錢甘草六分甘菊二錢棗仁八錢當歸三錢鉤鉤一兩決明一兩元參一錢川貝二錢大冬辰砂拌二錢鐵屑代水一兩項左六脈沉悶乃氣鬱不宣之象人身之陽氣宜於暢達欲有折挫或有疑難則氣不伸久鬱則上逆而為怒狂經以生鐵落飲為治鐵哦淘淨泥土煮湯一缸盆時時與飲粥亦用此湯煮藥亦以此代水石決明一具遠志一錢茯神三錢棗仁五錢乳香五分半夏一錢又玉樞丹化五分西黃一分研沖又診原方加蒲黃五分竹油三匕薑汁一匙程右暑風內襲走入少陽為寒熱走入肝絡為搐痙走入心包則有昏厥之變矣症非輕淺擬和少陽熄肝風清暑熱護心營一法柴胡四分黑梔一錢五分鉤鉤一兩決明一兩玉金七分翹心一錢川貝三錢羚羊一錢大冬辰砂拌一錢元參五錢棗仁三錢川連三分金器一件竹心一錢菖蒲三分竹油十匕西瓜青八分又診外受暑風與身中痰火相合為痙為狂為厥本應泄肝之用清心之陽惟天癸適止寒藥不宜然慮其熱入血室不得不少用寒涼擬龍膽泄肝意備採柴胡四分膽汁四分當歸三錢橘紅一錢黑梔一錢鉤鉤一兩決明一錢玉金一錢川貝三錢丹皮炒二錢膽星八分茯神辰砂拌二錢菖蒲三分竹油十匕鐵哦一兩又無形之火挾有形之痰或入變怪多端今舌色見黑象伸縮不常邪漸犯入心君不可不清矣川連六分犀角沖一錢羚羊一錢鉤鉤一兩膽心一錢玉金一錢棗仁炒一錢遠志炒七分生地八錢知母二錢菖蒲三分香附三錢薄荷一錢連翹二錢丹皮一錢龍齒煅三錢桑枝三錢硃砂一錢犀黃一分研極細末沖服清心丸五分又川連四分羚羊一錢鉤鉤一兩膽星七分玉金一錢棗仁炒五錢遠志五分黑梔一錢生地一兩香附三錢薄荷一錢丹皮一錢龍齒煅三錢菖蒲三分鐵屑湯煎藥太乙紫金丹磨一錢鄒右新產感受春溫先發痧疹繼以咳嗽內熱風溫痧火蒸變生痰瀰漫心胞阻遏會厭之所咽中似有物阻吐之不出咽之不下心胞主營新產後陰虧營損邪熱直入致神識模糊言語錯亂脈至弦滑用擬清豁痰火開泄心胞犀角七分丹皮一錢五分玉金一錢五分天竺黃一錢五分膽星四分元參三錢象貝二錢連翹一錢五分橘紅七分竹茹炒一錢又診痰因火動火來風威走入厥陰為痙厥走入心胞為昏迷走入陽明為狂妄種種變端無非痰火有餘乃因水之不足熄風清火豁痰在所必用苟不壯水何以復肺腎之陰羚羊角一錢犀角一錢丹皮一錢五分橘紅一錢黑梔一錢石決明一具麥冬辰砂拌二錢川貝二錢膽星六分鉤尖一兩生地一兩茯神二錢知母一錢竹油十匙蘆根八錢金器一具又診起則如狂啼笑無常痰火在厥陰陽明居多再議滌痰清火法羚羊角一錢丹皮一錢橘紅一錢黑山梔一錢石決明一具大麥冬二錢真川貝二錢膽星四分鉤鉤五錢茯神辰砂拌二錢竹油二十匕金器一件痙厥劭右肝陽亢逆左絲絃數之象大減厥亦漸輕仍宗清金平木壯水制陽為治羚羊角一錢南沙參五錢丹皮一錢五分石決明一兩川金一錢白芍二錢鉤鉤一兩生地一兩天麻一錢貝母一錢荸薺四個陳關蟄淡一兩金器一